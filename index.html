<script id="article-data" type="application/json">[{"num":"01","title":"自分のからだのことを、ちゃんと考え始めた話","category":"セルフケア・理念","isHub":false,"wordCount":2006,"body":"はじめまして。\n\nこのnoteは、自分のからだのことをずっと後回しにしてきた私が、40代に入って感じ始めたからだの変化をきっかけに、更年期のこと、婦人科のこと、生理や体調のことを少しずつ調べて、考えて、記録していくノートです。\n\n最初の記事なので、なぜ書き始めたのかを話させてください。\n\n## きっかけは、ある朝の「あれ、なんだろう」でした\n\nきっかけは、劇的な出来事ではありませんでした。\n\nある時期から、生理の周期がなんとなく乱れるようになりました。それと前後して、夜中に急に汗ばんで目が覚めたり、日中に理由もなく気分が沈んだり。ひとつひとつは大したことがないように思えて、そのたびに「疲れてるだけ」で片付けていました。\n\nでも、その「あれ、なんだろう」が積み重なってきたとき、ふと立ち止まったんです。\n\n**これって、もしかして更年期の入り口なのかな。**\n\nそう思った瞬間、認めたくない気持ちと、少しほっとする気持ちが、同時にやってきたのを覚えています。認めたくなかったのは、年齢のことを突きつけられた気がしたから。ほっとしたのは、「私が怠けているから調子が悪いわけじゃないのかもしれない」と思えたからでした。\n\n## それまでの私は、自分のからだをずっと後回しにしていた\n\n振り返ってみると、私は長いあいだ、自分のからだのことを後回しにしてきました。\n\n仕事の締め切り、家族の予定、子どものこと。手帳にはそういう予定がびっしり書いてあるのに、自分の体調のことだけは、いつも優先順位のいちばん後ろでした。\n\n生理痛は「我慢するもの」だと思っていたし、気分の浮き沈みも「そういう性格だから」で済ませていました。婦人科は「出産のときにお世話になった場所」くらいのイメージのまま、そのあとは何年も足が向いていませんでした。\n\n40代になって体調が変わってきても、しばらくは同じでした。「みんな通る道だから」「そのうち落ち着くだろう」と、また後ろに回していたんです。\n\nまわりの同世代も、忙しそうにしている人ばかりでした。だからよけいに、自分だけが立ち止まって体調のことを気にするのが、なんだか贅沢なことのように感じていたのかもしれません。\n\n## 調べはじめて、知らないことの多さに気づいた\n\n体調の変化が続いたことで、私は少しずつ調べるようになりました。そして、知らないことの多さに気づきました。\n\n更年期の不調には個人差がとても大きいらしいこと。婦人科だけでなく更年期外来という選択肢があること。オンラインで相談できる仕組みもあること。そして、我慢し続けなくても、相談できる場所があるということ。\n\nどれも、知っている人には当たり前のことなのかもしれません。でも私は、本当に何も知りませんでした。\n\nそして、たぶん私だけじゃないと思うんです。**知らなかったのは、知る機会がなかっただけ。** 誰のせいでもないと、今は思っています。\n\n## 「知っておく」だけで、気持ちは少し軽くなる\n\n調べていくなかで気づいたことがあります。\n\n知識があっても、不調そのものが消えるわけではありません。でも、「この変化は自分だけじゃない」「相談できる場所がある」と知っているだけで、気持ちは少し軽くなるんです。\n\nいちばんつらかったのは、体調の変化そのものより、「これが何なのか、どうすればいいのかわからない」という状態でした。正体がわからないと、人はよけいに不安になる。その時間が、いちばんしんどかった気がします。\n\nそれに、「更年期のせい」というひと言で全部を片付けてしまうと、今度は自分の気持ちのほうが置いてけぼりになる気がしました。だるさも、落ち込みも、ちゃんと言葉にしていいんだと思えたことは、私にとって小さな救いでした。\n\nだから私は、自分のからだの変化とちゃんと向き合っておくことは、すごく大事なことだと思うようになりました。\n\n## このnoteで書いていきたいこと\n\nこのnoteでは、こんなことを書いていく予定です。\n\n- 更年期かもしれないと思ってから、婦人科に行くまでに不安だったこと\n- 夫に体調の変化をどう伝えるか、迷った夜のこと\n- 婦人科・更年期外来・オンライン診療など、からだの相談先について調べたこと\n- 生理不順や気分の落ち込みなど、私の場合の体調のこと\n- 自分のからだを後回しにしないための、小さなセルフケアのこと\n\n偉そうなことは書けません。私は医療の専門家ではないし、今も戸惑いながら日々を過ごしています。\n\nただ、あの頃の私みたいに、仕事や家事の合間にひとりでスマホを検索している人に、「同じことで悩んだ人がここにいるよ」と伝えられたら。それだけで、このnoteを書く意味があると思っています。\n\nよかったらフォローして、たまに覗きにきてください。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"02","title":"更年期かもしれないと思ってから、婦人科に行くまでに私が不安だったこと【体験談】","category":"婦人科・検診","isHub":false,"wordCount":2008,"body":"このページを開いている人は、もしかしたら今、「これって更年期なのかな」と感じながら、なかなか一歩を踏み出せずにいるのかもしれません。\n\n最初にお伝えしておくと、この記事は医療情報ではなく、私個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。\n\nそのうえで。40代に入って体調の変化を感じ、「更年期かもしれない」と思ってから、実際に婦人科に相談するまでに、**私が何を不安に思っていたのか、そして実際はどうだったのか**を書いてみようと思います。\n\n当時の私は、こういう「普通の人の正直な話」がいちばん読みたかったので。\n\n## 「行こう」と思ってから、動くまでが長かった\n\n不調が続いていることには、うすうす気づいていました。\n\nそれでも、婦人科に予約の電話を入れるまでには、ずいぶん時間がかかりました。仕事や家のことに追われているうちに、「今日じゃなくてもいいか」がずっと続いていったんです。\n\n今思えば、私が本当に足踏みしていたのは、忙しさそのものよりも、**いくつかの漠然とした不安**でした。それを、当時の私はうまく言葉にできていませんでした。\n\n書き出してみると、私の不安は大きく4つありました。\n\n## 不安だったこと①：仕事や家庭と両立できるのか\n\nまず気になったのが、通院の時間をどう作るか、でした。\n\n平日は仕事、帰れば家のこと。「病院に行くために半日空ける」というのが、当時の私にはとてもハードルが高く感じられました。もし通院が続くことになったら、この生活の中でやりくりできるんだろうか、と。\n\n私の場合は、まず一度相談に行ってみて、そのうえで今後の通い方を医師と話す、という順番で考えるようにしたら、少し気持ちが軽くなりました。最初から全部の見通しを立てようとしなくてよかったんだ、と後で思いました。\n\n考えてみれば、仕事の予定も家の用事も、その都度調整しながらこなしてきたはずでした。自分のからだのことだけ「完璧に段取りしてから」と構えていたのは、後回しにするための言い訳だったのかもしれません。\n\n## 不安だったこと②：「大げさだと思われないか」\n\n次に引っかかっていたのが、「こんなことで行っていいのかな」という遠慮でした。\n\nはっきりした痛みや病気があるわけじゃない。ただなんとなく調子が悪いだけ。それを相談しに行くのは大げさなんじゃないか、と感じていました。\n\nでも、実際に相談してみて思ったのは、**「はっきりしない不調」こそ相談していい**ということでした。私が受診したときも、症状を丁寧に聞いてもらえて、「よくある相談のひとつ」として受け止めてもらえた感覚がありました。あの淡々とした空気に、私はむしろ救われました。\n\nそもそも、大げさかどうかを自分で判断しようとしていたこと自体が、少し無理のある話だったのかもしれません。それを判断するために相談に行くんだ、と思えたら、ハードルが少し下がりました。\n\n## 不安だったこと③：費用がどのくらいかかるのか\n\nお金の不安も、正直ありました。\n\n一度行ったら終わりなのか、それとも継続的に通うことになるのか。そのたびにいくらかかるのか。家計の中でどう考えればいいのか、見当がつかなくて不安でした。\n\n私の場合は、初回はまず相談だけ、という気持ちで行きました。そのうえで、この先どういう選択肢があって、どのくらいの費用感になりそうかを、その場で確認するようにしました。金額の見通しが少し立つだけで、当日の不安がひとつ減ります。聞くのは全然恥ずかしいことではなかったです。\n\n## 不安だったこと④：家族や職場に知られないか\n\nそして、いちばん人に言いづらい不安。「家族や職場にどう思われるか」でした。\n\n通院のことを家族にどう説明しよう。職場で「体調が」と言ったら、気をつかわせてしまわないか。そんな想像ばかりしていました。\n\nこれは人によって事情が違うと思うので、正解は書けません。私の場合は、まず相談に行ってから、必要な範囲で少しずつ家族に話す、という進め方にしました。全部を一度に打ち明けなくても、通院はできる。そう気づけたことで、動きやすくなりました。\n\n## 同じように迷っている人へ\n\nこうして書き出してみると、私の不安は「両立・遠慮・お金・人目」の4つでした。\n\nそして、そのどれもが、**一度相談してみたら見通しが立つもの**でした。いちばんつらかったのは、不安なまま何も決められずに検索し続けていた時間だったと思います。\n\nもし今、あの頃の私と同じように足踏みしている人がいたら。不安を全部ひとりで抱えなくていいと思います。婦人科の先生は、こういう相談を毎日受けているプロです。ひとりで抱え込まなくていいと、私は思っています。\n\n同じように悩んでいる人に、この記事が少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"03","title":"夫にどう伝えるか迷った夜。体調の変化をどう説明するか考えた","category":"パートナー・家族","isHub":false,"wordCount":1982,"body":"「これって更年期の入り口かもしれない」と感じ始めた頃。\n\n私が意外と悩んだのは、病院のことでも症状のことでもなく、「**夫に、この体調の変化をどう伝えるか**」でした。\n\n先に言っておくと、この記事は「夫には絶対言うべき」と説くものではありません。伝えるか、どう伝えるかに正解はないと、今でも思っています。ただ、あの頃さんざん迷った私が、何を考えて、どうしたのかを書いておきたいと思いました。\n\n同じように迷っている人が、きっといると思うから。\n\n## うまく言葉にできなかった理由\n\n正直に書きます。私は最初、なかなか切り出せませんでした。\n\n理由はいくつもありました。\n\nまず、自分でも状態をうまく説明できなかったこと。どこがどう痛いというはっきりした症状ではなく、「なんとなくだるい」「急に汗ばむ」「わけもなく落ち込む」。自分でも輪郭がつかめないものを、人に伝えるのは難しいものです。\n\n次に、心配をかけたくない気持ち。長年連れ添った相手だからこそ、「大丈夫?」と気をつかわせるのが申し訳ない気がしました。\n\nそして、少しの気まずさ。からだの変化の話を、あらためて切り出すのは、長い付き合いでもなんだか照れくさかったんです。\n\n今振り返ると、**私は体調の心配と同じくらい、「わかってもらえなかったらどうしよう」という不安を抱えていた**んだと思います。\n\n## それでも伝えようと思った理由\n\nしばらく考えて、私は伝えることにしました。\n\n決め手は、シンプルな気づきでした。\n\n黙っていると、私の不機嫌や体調の波が、理由のわからないものとして相手に伝わってしまう。それはお互いにとって、いちばんしんどいことなんじゃないか、と。\n\n不調があるのは私です。それは変えられません。でも、少なくとも「何が起きているのか、相手が何も知らないまま」にしておくのは、これからも一緒に暮らしていくうえでフェアじゃない気がしました。\n\nあとは単純に、ひとりで抱えているのがしんどかった、というのもあります。誰かに「そうなんだ」と受け止めてほしかった。それが本音です。\n\n## 私がどう伝えたか\n\nかっこいい伝え方は、できませんでした。\n\n改まって向き合って話す自信がなかったので、私は夜、片付けをしながら、なるべく軽い調子で切り出しました。最終的に言ったのは、たしかこんな感じの短い言葉でした。\n\n「最近ちょっと体調の波があってさ。更年期の入り口かもしれないから、一度婦人科で相談してみようと思ってる」\n\nポイントがあったとすれば、「つらいの」ではなく「相談してみようと思ってる」まで添えたことです。狙ったわけではなくて、心配だけをかけるのが嫌だったから。でも結果的に、話が「どうしよう」ではなく「こう進めようと思ってる」から始まったのは、よかったのかもしれません。\n\n## 「察してほしい」を手放したら、楽になった\n\n伝えるまでの私は、心のどこかで「言わなくても察してほしい」と思っていました。\n\nでも、体調の波は目に見えません。長年一緒にいても、言葉にしなければ伝わらないことはある。そう割り切って、「今日は少ししんどい」「今週は無理をしたくない」と、その都度ことばにするようにしたら、思ったより楽になりました。\n\n相手も、理由がわかれば身構えずに受け止めやすいようでした。**「察してもらう」より「伝える」ほうが、結局はお互い楽だった**というのが、私の場合の実感です。\n\n## 伝えてみて、感じたこと\n\n夫の第一声は、「そうだったんだ。話してくれてよかった」でした。\n\n正直、ほっとしました。特別な言葉をもらえたからではなく、体調の波を「私だけの問題」ではなく「一緒に付き合っていくこと」として受け止めてもらえた気がしたからです。\n\nそのあとドラマのような変化があったわけではありません。ただ、しんどい日に少し家のことを代わってくれたり、「無理してない?」と一言かけてくれたり。淡々としたやりとりです。でも、この時期に「ひとりじゃない」と思えたことに、どれだけ助けられたか。\n\n## うまく伝わらない場合も、あると思う\n\nここまで読んで、「うちはそんなにうまくいかない」と感じた人もいるかもしれません。\n\n伝えても軽く流されそう。わかってもらえる気がしない。そういう関係も、現実にはあると思います。\n\nその場合も、あなたが悪いわけではありません。私の場合は夫に伝えることを選びましたが、人によって関係性は違うと思います。話せる相手は、パートナー以外にもいます。友人でも、婦人科の先生でも、公的な相談窓口でも。ひとりで抱え込まなくていいと、私は思っています。\n\nこれは私の場合の話で、関係の数だけ答えがあると思います。それでも、あの夜の私と同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"04","title":"更年期外来に行ったあと、「からだの相談先」がないことに気づいた話","category":"相談先・オンライン診療","isHub":false,"wordCount":1999,"body":"思い切って更年期外来に相談に行って、話を聞いてもらって、私の「とりあえずの一歩」は踏み出せました。\n\nでも、心のどこかがずっと落ち着かないままでした。\n\n安心したはずなのに、なんだろう、このモヤモヤ。しばらくして、その正体に気づきました。\n\n**私、これからからだのことで迷ったとき、どこに相談すればいいんだろう。**\n\n今回はそんな、「一度相談したあと」の話です。婦人科に行きづらいと感じている人や、からだのちょっとした悩みをどこに相談すればいいかわからない人に読んでもらえたらうれしいです。\n\n## 「次に何かあったら」が、ずっと頭に残っていた\n\n更年期外来を探したとき、私はスマホで検索して、口コミを読みあさって、やっと一軒を選びました。\n\nつまり、体調が気になり始めてから、ゼロから相談先を探したわけです。あれはなかなか大変でした。どこがいいのか判断がつかないまま、手探りで決めたので。\n\nそして相談したあとの今も、私には「気軽に頼れるかかりつけ」のようなものが、まだしっくりきていませんでした。また体調が変わったら? 別のことで気になることが出てきたら? そのたびにまた、ゼロから探すの?\n\n**「困ってから探す」のは、いちばん心細いタイミングで、いちばん手間のかかる作業をすることなんだ**と、あのとき身にしみてわかりました。\n\n## 行きづらかった理由を、言葉にしてみた\n\nじゃあ相談先を決めておけばいい。頭ではわかっているのに、なかなか動けませんでした。\n\nなんでだろう、と思って、行きづらさの理由を書き出してみました。\n\n- 「はっきりした病気じゃないのに行っていいのかな」という遠慮\n- 「更年期だから仕方ない」で済ませてしまう気持ち\n- 待合室で近所の知り合いに会ったら、という気まずさ\n- 忙しくて通う時間を作れるか、という不安\n\n書き出してみて気づいたのは、どれも「行ってはいけない理由」ではなく「気持ちや生活のハードル」だということでした。そして、たぶんこのハードルを感じているのは私だけじゃないと思います。\n\n## 相談先には、いくつかの入り口があるらしい\n\n調べていくうちに、からだの相談先にはいくつかの入り口があることがわかってきました。\n\n私が整理した限りでは、こんな感じです。\n\n- **婦人科・産婦人科**：しっかり診てもらいたいとき。検査が必要かもしれないとき\n- **更年期外来**：更年期の症状について、まとめて相談したいとき\n- **オンライン診療**：外出しづらいとき。時間がないとき。まず話だけ聞いてほしいとき\n- **自治体や公的機関の相談窓口**：お金のこと、誰にも言いづらいことで困ったとき\n\nどれが上、というものではないと思います。状況によって、合う入り口は変わる。それがわかっただけでも、少し気持ちが整理されました。\n\n## 「パーソナルケアクリニック」という選択肢もあった\n\n相談先を調べているなかで、私は「パーソナルケアクリニック」と呼ばれるようなクリニックがあることも知りました。\n\n私の理解では、女性のからだにまつわる悩みを、相談しやすい雰囲気で扱っているクリニックのことです。内装やウェブサイトの空気感が病院っぽくなかったり、オンラインでの診察に対応しているところもあるようでした。\n\n正直、最初に見つけたときは「こんな場所もあるんだ」と思いました。「病気を治しに行く場所」というより「からだのことを相談しに行く場所」として設計されている感じがして、私が感じていた気持ちのハードルが、ここならいくつか消えるかもしれない、と感じたんです。\n\nもちろん、これは私の受け取り方です。じっくり検査してもらう場面では従来の婦人科のほうが合うこともあると思うし、クリニックによって雰囲気も内容もさまざまだと思います。「一番いい」ではなく、**選択肢のひとつが増えた**という感覚が、私にはいちばんしっくりきています。\n\n## 私なりの「相談先リスト」を作ってみた\n\nそれで私は、スマホのメモに小さなリストを作りました。名付けて「からだの相談先リスト」です。\n\nどんな悩みのときに、どこを頼るか。それを元気なうちに書いておくだけです。内容は人によって違っていいと思います。\n\nポイントは、**調子がいいときに、落ち着いた頭で作っておく**こと。体調が揺れているときの私に、いちばん足りなかったものでした。\n\nこのリストを作ってから、「次に何かあったらどうしよう」の「どうしよう」の部分が、少しだけ具体的になりました。自分のからだの相談先を持っておくこと。それは、備えというだけじゃなくて、「自分のからだを後回しにしない」というセルフケアそのものなんだと、私は思っています。\n\n急がなくて大丈夫です。元気な今のうちに、ゆっくり。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"05","title":"更年期外来はどこに行けばいい？病院を選ぶのが不安だった私が調べたこと","category":"婦人科・検診","isHub":false,"wordCount":2027,"body":"「更年期の症状を相談してみようかな」と思ったとき。\n\n当時の私の前に立ちはだかったのは、意外なハードルでした。\n\n**「そもそも、どこに行けばいいの?」**\n\nこの記事では、そんな私が当時調べた「相談先の選び方」を、体験談として整理してみます。\n\n最初にお伝えしておくと、この記事は医療情報ではなく、私が経験・調べた時点での個人の記録です。制度や費用は変わることがあるので、最新の情報は必ず医療機関や公的機関で確認してください。\n\n## 「行こう」と決めたのに、そこで止まってしまった\n\n相談してみようと決心したのはいいものの、私はそこでまた立ち止まりました。\n\n婦人科? 更年期外来? 何が違うの? 家の近く? 職場の近く? 検索すればするほど選択肢が出てきて、どれを選べばいいのかわからなくなってしまったんです。\n\nいま振り返って言えるのは、**「完璧な一軒」を探そうとして止まっていた時間が、いちばんもったいなかった**ということです。まずどこかに相談してみれば、そこから調整もできた。だからこの記事を書いています。\n\n私が考えた「選ぶときの軸」は、大きく4つでした。\n\n## 軸①：婦人科か、更年期外来か\n\nまず迷ったのが、婦人科と更年期外来の違いでした。\n\n私が調べた限りでは、更年期外来は更年期の症状の相談に力を入れているところ、という位置づけのようでした。一方で、一般の婦人科でも更年期の相談に対応しているところは多いようです。\n\n私の場合は、「更年期の相談ができますか」と電話で確認してから決めました。呼び名にこだわりすぎず、**自分の相談したいことを扱ってくれるかどうか**で見たほうが、選びやすかったです。\n\n最初は「更年期外来」という専門の看板があるところじゃないとダメなのかな、と思い込んでいました。でも調べていくうちに、大事なのは看板の名前より、自分の話を聞いてもらえる場所かどうかなんだと気づきました。\n\n## 軸②：通いやすさ\n\n次に大事にしたのが、通いやすさでした。\n\nもし継続して通うことになったら、遠い場所だと足が遠のいてしまう。かといって、近所すぎると知り合いに会うのが気になる。このバランスに、けっこう悩みました。\n\n私の場合は、「無理なく続けられる距離か」を優先しました。仕事帰りに寄れるか、休みの日に行きやすいか。生活のリズムに合うかどうかは、続けるうえで意外と大事だと感じています。\n\n## 軸③：話しやすそうな雰囲気か\n\nそして、これは行ってみないとわからない部分もありますが、「話しやすそうか」も気にしました。\n\nからだの変化や気分の落ち込みのような、言葉にしにくいことを相談する場所です。急かされずに話を聞いてもらえそうか、という点は、私にとって大事でした。\n\n事前に完全にはわからないので、私はウェブサイトの説明の丁寧さや、電話で問い合わせたときの応対の感じを、ひとつの参考にしました。もし一度行って合わないと感じたら、別のところを探してもいい。そう思えたら、少し気が楽になりました。\n\n美容院やお店を選ぶときも、一度行ってみて合わなければ変えますよね。相談先も、それと同じくらいの気持ちで考えていいんだと、途中から思えるようになりました。最初の一軒が「一生の一軒」である必要はない、と。\n\n## 軸④：オンライン診療という選び方もある\n\nもうひとつ、私が知って心強かったのが、オンライン診療という選択肢です。\n\nスマホのビデオ通話などで医師に相談できる仕組みで、私が調べた時点では、更年期の相談に対応しているサービスもあるようでした。仕事や家のことで外出の時間を作りにくい人、対面がまだ怖い人には、現実的な選択肢かもしれません。\n\n一方で、対面の診察ではない分、体調によっては受診をすすめられる場合もあるようです。このあたりは各サービスの案内をよく読んで、相談時に医師に確認するのが確実だと思います。\n\n## 私の場合は、こう選んだ\n\n私は結局、「更年期の相談ができる」と電話で確認できた、通いやすい場所を選びました。\n\n理由はシンプルで、「無理なく続けられそうだったから」。あんなに悩んだのに、決め手は結局それでした。そして、一度行ってみて話しやすいと感じられたので、私にはその選び方が合っていたと思います。\n\nでもこれは私の場合の話です。住んでいる場所、生活リズム、体調、気持ちの状態によって、選ぶものは変わっていいと思います。\n\n## 迷っている時間より、まず一歩\n\n最後に、あの頃の私に言いたいことを書いて終わります。\n\nどこがいいか決められなくて動けない気持ちは、よくわかる。でも、選択肢はひとつじゃないし、合わなければ変えてもいい。最初から完璧な一軒を選ぼうとしなくて大丈夫。\n\nまずどこかに相談だけしてみてほしい。ひとりで抱え込まなくていいと、私は思っています。\n\n同じように悩んでいる人に、この記事が少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"06","title":"はじめての更年期外来。行く前の私が知りたかった10のこと","category":"婦人科・検診","isHub":false,"wordCount":2334,"body":"更年期外来の予約の電話をかける前、私はスマホを持ったまま、キッチンで立ち尽くしていました。\n\n何て言えばいいんだろう。ふつうの婦人科とは違うの？内診はある？そもそも、この程度のことで行っていい場所なの？\n\n調べても医療機関の公式説明や難しい言葉ばかりで、「実際に行った人の実感」がなかなか見つからない。だからこの記事では、はじめて更年期外来に行った私が「先に知りたかったこと」を10個、まとめておきます。診断のような話ではなく、あくまで私が体験して感じたことです。\n\nこれから初めて行こうとしている、あの頃の私みたいな人の、深呼吸の回数が少しでも減りますように。\n\n## そもそも、行こうと思うまでが長かった\n\n正直に書くと、予約の電話をかけるまでに、何ヶ月もかかりました。\n\n「まだ我慢できる」「わざわざ行くほどじゃない」と、自分で自分をなだめていた期間が長かったんです。行こうかなと思っては、忙しさを言い訳に先延ばしにする。その繰り返しでした。\n\n背中を押してくれたのは、大きな決心ではなくて、「一回、話を聞いてもらうだけでもいいか」という軽い気持ちでした。今思えば、その\"軽さ\"にたどり着くまでがいちばん長かった気がします。だから、まだ電話をかけられていない人の気持ちも、すごくわかるつもりです。\n\n## 行く前に知りたかったこと（前半）\n\n**1. 予約の電話は、一言で通じた**\n\n「体調のことで相談したいのですが」。私が絞り出した一言はこれだけでしたが、あとは受付の人が全部誘導してくれました。症状をうまく説明できなくても大丈夫でした。向こうは毎日この電話を受けているプロなんだと、あとで思いました。\n\n**2. 「更年期外来」と身構えなくてよかった**\n\n私は「更年期外来」という名前だけで、特別な覚悟がいる場所だと思っていました。でも実際は、婦人科の相談窓口のひとつ、くらいの空気でした。私の場合、大げさに構えていた自分がちょっと拍子抜けするくらいでした。\n\n**3. 持ち物は保険証と、あれば記録**\n\n保険証（マイナンバーカード）、お薬手帳、そして体調のメモ。私は「最近気になっていること」をスマホのメモに雑に書いて持っていきました。緊張して頭が真っ白になっても、画面を見ながら話せたので助かりました。\n\n**4. 問診票が思ったより細かかった**\n\nこれは事前に知っておいてよかったことのひとつです。生理の状況や、最近の体調、眠れているかどうかなど、いくつも質問がありました。私は待合室で慌てて思い出そうとして、少し焦りました。書けないところは「わからない」で大丈夫でしたが、思い当たることを軽くメモしておくと落ち着けたと思います。\n\n**5. 内診が「必ずある」わけではなかった**\n\n私が一番怖かったのはこれでした。でも私の場合、初回は問診と話が中心でした。そして知ったのは、**「内診が不安です」と伝えていい**ということ。伝えたら、進め方を丁寧に説明してもらえました。怖さを我慢して黙っている必要はなかったです。\n\n## 行く前に知りたかったこと（後半）\n\n**6. 待合室は、ふつうの病院と同じだった**\n\n更年期外来だけ特別に重い空気、ということはなくて、待合室は内科や皮膚科と変わりませんでした。年齢の近そうな人もいれば、若い人もいて、スマホを見ている人がほとんどでした。「私だけ場違いかも」という心配は、杞憂でした。\n\n**7. 費用は事前に電話で聞けた**\n\n「初診でだいたいどれくらいかかりますか」と予約のときに聞きました。相談内容によって変わるようですが、目安を知っているだけで当日の緊張がひとつ減りました。家計を預かる身としては、ここが曖昧なままだと動きにくかったので、聞いておいてよかったです。\n\n**8. 先生との相性は、ある**\n\nこれは正直あると思います。合わないなと感じたら、別のところに変えていい。1回で「更年期外来ぜんぶ無理」と結論を出さなくていいんだと、あとから思いました。私の場合、話をさえぎらずに聞いてくれる先生で、ほっとしたのを覚えています。\n\n**9. 聞きたいことはメモして行く**\n\n診察室に入ると、緊張で予定していた質問が飛びます。私はスマホのメモに聞きたいことを3つ書いて行って、最後に画面を見ながら聞きました。変な顔はされませんでした。「こんなことまで聞いていいのかな」と思ったことも、意外とちゃんと答えてもらえました。\n\n**10. 「この年で来て大げさ」とは、言われなかった**\n\n一番恐れていたのは、あきれられることでした。でもその空気は最後まで出てきませんでした。むしろ「気になることがあったら、また来てくださいね」で終わりました。不調がはっきりしなくても、相談だけでも行っていい場所なんだと思えた瞬間でした。\n\n## 行ってみて、いちばん変わったこと\n\n10個書きましたが、いちばん大きかった変化は知識ではありません。\n\n**「何かあったら、あそこで相談すればいい」と思える場所ができたこと**です。\n\n行く前の更年期外来は、得体の知れない、少し重たい場所でした。一度行ったあとは、「知っている場所」になりました。この差は、想像していたよりずっと大きかったです。\n\n自分の体調が更年期によるものなのかどうか、私が自分で判断できることではありません。それでも、ひとりで抱えて検索し続けるより、相談できる場所を持てたことのほうが、私にはずっと大きな安心でした。\n\n同じように、予約の電話の前で固まっている人に届いたらうれしいです。深呼吸したら、あとは受付の人がなんとかしてくれます。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"07","title":"イライラや落ち込みを「性格のせい」「更年期のせい」で片付けていた私へ","category":"更年期症状・からだ","isHub":false,"wordCount":2056,"body":"ここ数年、自分の機嫌が自分でコントロールできない時期が増えました。\n\n些細な一言にイラッとして、そのあと猛烈に落ち込む。仕事で小さなミスをしただけで、自分はもうダメだと感じる。夜、理由もなく気持ちが沈んで、涙が出ることもある。\n\n若い頃にもこういう波はあった気がします。でも、あの頃と今とでは、片付け方がすっかり変わっていました。今日はその話を書きます。\n\n## 「性格のせい」から「更年期のせい」に変わっただけだった\n\n若い頃の私は、こういう不安定さをぜんぶ「性格」だと思っていました。\n\n情緒不安定なのは私が未熟だから。イライラするのは心が狭いから。夫に八つ当たりしてしまうのは、私の性格が悪いから。謝って、自己嫌悪して、「次はちゃんとしよう」と決意して。でもまた同じことが起きる。\n\nそして40代に入ってから、私の口ぐせが変わりました。「私ってこういう性格だから」が、「もう更年期だから仕方ない」に。\n\n一見、自分を責めていないように聞こえます。でも実際は、**「性格のせい」も「更年期のせい」も、\"どうせ直らないもの\"として自分を投げ出す言葉**でした。責める対象が変わっただけで、自分の不調をちゃんと見ていないのは同じだったんです。\n\n## 仕事で、いちばんこたえた\n\nとくにこたえたのは、仕事のときでした。\n\n集中が続かない。前ならすぐ思い出せた名前や段取りが、ぱっと出てこない。同僚の何気ない言葉に過剰に反応して、あとで「あんな態度をとらなくてもよかった」と落ち込む。\n\n長くやってきた仕事で、こんなふうに自分のパフォーマンスが落ちていくのは、想像以上にしんどいものでした。「歳のせい」で片付けようとするたびに、心のどこかが納得していない感じがありました。\n\n## 記録が教えてくれた、私の波\n\nきっかけは、なんとなく始めた体調メモでした。\n\n生理の状況が以前と変わってきたこともあって、体調管理のアプリに、その日の気分も一緒に書くようになったんです。「今日はダメな日」「イライラした」「よく眠れなかった」くらいの雑なメモです。\n\n数ヶ月分たまったころ、ながめていて気づきました。\n\n**「ダメな日」、なんとなく固まって並んでる。**\n\n体調のゆらぎと、気分の落ち込みが、近い時期に集まっているように見えました。性格のせいなら毎日のはずだし、歳のせいで一括りにするには、波がありすぎる。少なくとも「ただの性格」でも「ただの加齢」でもなさそうだ、と思えたんです。\n\n## 名前や周期を意識できると、責めなくなる\n\nこれがPMSなのか、更年期にまつわる不調なのか、その両方なのか、私が自分で断定することはできません。それは相談すべきことだと思っています。\n\nでも、「性格ではなく、からだの状態と関係しているのかもしれない」と考えられるようになっただけで、ずいぶん楽になりました。\n\n責める対象が、なくなったんです。\n\n「私が悪い」でも「もう歳だから終わり」でもなく、「今はそういう波の時期かもしれない」。この言い換えができるようになってから、自己嫌悪のループがゆるみました。**自分の不調を、ちゃんと見てあげられるようになった**のが、いちばん大きな変化でした。\n\n## 私がやっている、小さな対処\n\nそれから私がやるようになったことを、いくつか書いておきます。効果を保証するものではなくて、あくまで私の場合です。\n\n- **記録を続ける**：「そろそろ来そうだな」と予測できるだけで、心の構えが違います\n- **大事な予定を、できれば波の時期に入れない**：大きな決断や、言いにくい話し合いは、できる範囲で避けます\n- **仕事のやり方を少し変える**：調子の出ない日は、頭を使う作業を後ろに回して、単純作業から手をつけるようにしました\n- **先に夫に伝えておく**：「この時期はちょっと不安定かも」と言っておくと、八つ当たりのあとの気まずさが減りました\n\n## つらいときは、相談していい\n\nもうひとつ思うのは、こういう気分の波は「もう歳だから我慢するしかない」ものではない、ということです。\n\nつらさが続くなら、婦人科や更年期外来で相談していい。私自身、相談したことで気持ちが軽くなった部分がありました。症状や対処は人によってかなり違うようなので、私が具体的に書くべきことではないと思っています。\n\n「この程度で相談していいのかな」と思っている人にこそ、伝えたいです。毎日の自分がしんどいなら、それは相談していい理由になると、私は思います。\n\n## あの頃の私へ\n\nあなたの性格は悪くない。歳をとったから終わり、でもない。\n\nただ、からだの変化と気分の波のつながりを、まだ誰も教えてくれていなかっただけ。\n\n同じように「性格のせい」「更年期のせい」で自分を投げ出しかけている人に、この記事が届いたらうれしいです。まずは、その日の気分をひとことメモするところからでも、始めてみてください。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"08","title":"婦人科の費用、家計の中でどう考えた？お金の話を曖昧にしなかった理由","category":"お金・費用","isHub":false,"wordCount":1910,"body":"更年期外来に通うようになって、体調のこととは別に、私の中でずっと引っかかっていたことがあります。\n\nお金の話です。\n\n今日は、通院の費用を家計の中でどう考えたか、なぜ曖昧にしたくなかったのかを書きます。最初にお断りしておくと、これは「こう分けるべき」という記事ではありません。私たちの家の場合の記録です。費用も時期や医療機関によって変わるので、正確な金額はそのつど確認してください。\n\n## 一回一回は小さくても、積み重なると気になった\n\n婦人科や更年期外来の費用は、私が調べたり実際に払ったりした範囲では、相談の内容によって幅がありました。一回だけならまだしも、続けて通うとなると話が変わってきます。\n\n我が家は、子どもの教育費や住宅ローンなど、決まった出費がいくつもある時期です。その中で、自分のからだのための出費を、どう位置づけていいのかがわからなかった。\n\nそして気づきました。この費用、黙っていれば「私のおこづかいの範囲」でこっそり処理することになる。でも、家計の話として出すのは、なんだか気が引ける。\n\n## 「自分のことにお金をかける」うしろめたさ\n\n正直に言うと、いちばんの引っかかりは金額そのものではありませんでした。\n\n**家族のためのお金は迷わず出すのに、自分のからだのための出費になると、急にうしろめたくなる。** この感覚のほうが、私にとっては大きな問題でした。\n\n家計簿に自分の通院費を書き込むとき、ほんの少し、申し訳ないような気持ちになる。子どものものや食費と並ぶと、自分の分だけ「なくてもいい出費」みたいに見えてくる。\n\nでも、そこで曖昧にして自分の財布からこっそり出し続けたら、たぶん私はずっとこのうしろめたさを抱えたままになる。それは、あとからモヤモヤする予感がありました。\n\n## 私たちの場合：家計の話として、夫に伝えた\n\n結局、私は思いきって夫に話しました。LINEでもなく、夜、落ち着いたタイミングで。\n\n「体調のことで通院を続けようと思っていて、これくらいの費用がかかりそう。家計から出したい」。\n\n構えて切り出したわりに、夫の反応はあっさりしていました。「そんなの当然、家計から出せばいいでしょ」と。拍子抜けするくらいでした。私が勝手に「自分のことでお金を使うのは申し訳ない」と背負い込んでいただけだったのかもしれません。\n\nもちろん、家庭によって財布の事情はさまざまだと思います。うちはたまたまこの形で落ち着きましたが、これが正解というわけではありません。ただ、**「家族の出費」と同じテーブルに、自分の通院費をちゃんと乗せられた**ことが、私には大きかったです。\n\n## 曖昧にすると、お金のモヤモヤは別のモヤモヤに変わる\n\nこの一件で、私が学んだことがあります。\n\n**お金の話を曖昧なまま流すと、そのモヤモヤは「私だけが我慢している」という感覚に変わっていく。** 金額の問題ではなくて、自分の健康を家計の中でどう扱うか、という問題でした。\n\nこっそり自分の財布から出し続けていたら、私はきっと、通院そのものを「贅沢」だと感じるようになっていたと思います。そうなると、続けるのがだんだんおっくうになる。お金の曖昧さは、じわじわと通院のハードルを上げていくものでした。\n\n## お金の話ができると、体調の話もしやすくなった\n\nもうひとつ気づいたことがあります。\n\n一度、通院費のことを夫と話せたあとは、体調そのものの話もしやすくなっていました。考えてみれば当然で、どちらも「言いにくいけれど、生活に関わる現実的な話」だからです。\n\n「今日は調子が悪い」「更年期外来に行ってくる」。そういう言葉が、前より自然に出せるようになりました。お金の話を一度乗り越えたことは、私にとって、体調を家族と共有する練習にもなっていたのだと思います。\n\n## お金がハードルで動けずにいる人へ\n\nここまで読んで、「うちは家計の話ができる関係じゃない」と感じた人もいると思います。\n\nそういう場合でも、まず優先してほしいのは、あなた自身のからだです。費用そのものがハードルで受診をためらっているなら、ひとりで抱え込まずに、医療機関に事情を相談してみてほしいです。自治体などに相談窓口がある場合もあるようです。\n\nお金の分け方や家計の考え方は、家庭の数だけあると思います。だからこそ、自分の中で曖昧にしないこと。それだけは、経験から伝えたいと思いました。\n\n同じように、自分のからだにお金をかけることをためらっている人に、この記事が届いたらうれしいです。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"09","title":"婦人科の待合室で知り合いに会いたくない。地域で通うのが気まずかった私が調べた選択肢","category":"相談先・オンライン診療","isHub":false,"wordCount":1957,"body":"婦人科の予約を取った日の朝、私は玄関で足が止まりました。\n\n頭に浮かんでいたのは、診察のことではありません。**待合室で知り合いに会ったらどうしよう**、でした。\n\n長く同じ地域に住んでいると、行動範囲の中に知り合いが増えます。受付で名前を呼ばれるところをママ友に見られたら。駐車場でご近所の人とすれ違ったら。そんな想像ばかりが膨らんで、「今日じゃなくてもいいか」と引き返しそうになりました。\n\n今日は、地域で婦人科に通うのが気まずかった私が、やってきた工夫と、調べて知った選択肢の話です。\n\n## 「気にしすぎ」と言われても、気まずいものは気まずい\n\n先に言わせてください。この気まずさを「考えすぎだよ」と流されるのが、私はいちばんつらかったです。\n\n婦人科に行くこと自体は、何もやましいことではありません。頭ではわかっています。でも、狭い地域では「あの人、婦人科に何しに行ったんだろう」と想像される可能性があるだけで、受診のハードルは上がる。\n\nしかも私くらいの年齢だと、想像に「更年期かな」という色がつくのも、なんとなく引っかかりました。自分の体調のことを、顔見知りに勝手に推測される感じが、どうにも落ち着かなかったんです。\n\n実際に会うかどうかじゃなくて、「会うかもしれない」だけで足が止まる。この感覚、わかる人にはわかると思います。\n\n## 私がやっていた、小さな工夫\n\nそれでも通院が必要だった時期、私がやっていた工夫です。\n\n- **平日の時間帯を選ぶ**：子どもの学校や送り迎えと重ならない時間は、知った顔に会いにくい時間帯でもありました\n- **少し離れた街のクリニックを選ぶ**：電車や車で数十分ぶんの安心感は、交通費や手間に代えられませんでした\n- **予約制のクリニックを選ぶ**：待合室にいる時間そのものが短くなります\n\nどれも根本解決ではありません。でも、「工夫すれば行ける」と思えることが、当時の私には大事でした。行かない理由を探すのをやめて、行くための工夫を探すほうに気持ちが向いたのは、この小さな成功体験のおかげだった気がします。\n\nちなみに、少し離れた街を選ぶと、通院の日がちょっとした外出になる、という思わぬ効能もありました。診察のあとに知らない街のカフェでひと息つく。人目を避けるための工夫が、いつのまにか自分をいたわる時間にもなっていました。\n\n## オンライン診療という選択肢を知った\n\nそして調べる中で知ったのが、オンライン診療でした。\n\nスマホのビデオ通話などで医師の診察を受けて、薬は配送や近くの薬局で受け取る。私が調べた時点では、生理や更年期にまつわる相談などに対応しているサービスもあるようでした。女性のからだのケアを専門にした、オンライン対応のパーソナルケアクリニックのような場所もあるようです。\n\n最初に思ったのは、「これ、待合室がそもそも存在しない」ということでした。\n\n知り合いに会う可能性を工夫で減らすんじゃなくて、はじめから顔を合わせずに済む選択肢がある。地域での人目にずっと悩んできた身としては、けっこう驚きでした。\n\nもちろん、オンラインには限界もあると思います。検査が必要な場合は結局対面になるようですし、直接診てもらう安心感はオンラインでは代えがたい。このあたりは症状や状況によるので、各サービスの案内や医師の判断を確認してください。\n\n## 私なりの使い分け\n\n今の私は、こんなふうに考えています。\n\n**じっくり診てもらいたいときや、検査が必要そうなときは対面。相談が中心のときや、続けての受診はオンラインも選択肢。**\n\nこれはあくまで私の使い分けで、正解ではありません。ただ、「対面かオンラインか選べる」という状態になったこと自体が、受診のハードルをすごく下げてくれました。選択肢があると、人は動きやすくなります。\n\n近所の目を気にして通院を先延ばしにしていた頃の私に、この使い分けを教えてあげたいくらいです。\n\n## 人目を気にする自分を、責めなくていい\n\n最後に、あの日の玄関で足が止まっていた私に言いたいことを書きます。\n\n人目が気になるのは、あなたが気にしすぎだからじゃない。長く同じ場所で暮らしてきた人ほど、地域のつながりの中で生きているのだから、当然のことです。そして環境の問題は、環境側の工夫と選択肢で対処すればいい。無理に「気にしないように」と頑張る必要はありません。\n\n**「気にせず済む方法を選ぶ」のも、立派な自分の守り方**だと、今の私は思っています。\n\n同じように、待合室や近所の目が気になって足が止まっている人に、この記事が届いたらうれしいです。工夫でも、選択肢でも、自分が動きやすい方法を選んでいいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"10","title":"更年期と、ただの体調不良。私がずっと混同していたこと","category":"更年期症状・からだ","isHub":false,"wordCount":1938,"body":"正直な告白から始めます。\n\n40代に入ってしばらく、私は自分の不調を、ぜんぶ同じ箱に放り込んでいました。疲れやすいのも、眠りが浅いのも、気分が沈むのも、なんとなく「体調不良」というひとつの箱。あるいは「更年期」というひとつの箱。\n\nどっちの箱に入れても、結局やることは「我慢してやり過ごす」で同じでした。同じように混同している人、実はけっこう多いんじゃないかと思います。\n\n今日は、当時の私が混同していたことを整理して書きます。先にお伝えすると、この記事は医療情報ではなく、私が体験した範囲の個人の記録です。何がどの不調なのかは、私が判断できることではないので、その前提で読んでください。\n\n## 混同していたこと①：全部を「更年期」で片付けていた\n\nいちばん大きかったのはこれです。\n\n疲れが抜けない、寝ても寝た気がしない、なんだか気分が晴れない。40代になってこういうことが増えると、私は反射的に「もう更年期だから」と片付けていました。\n\nでも、あとから振り返ると、その中には**ただの寝不足や、働きすぎや、季節の変わり目の不調**も混ざっていたはずなんです。全部を「更年期」のせいにしていると、本当は休めば治るものまで「歳だから仕方ない」と我慢してしまう。逆もありました。「これはただの疲れ」と流していたら、いつまでも軽くならない不調もあった。\n\n何でもかんでも同じ箱に入れると、自分が本当は何にしんどいのか、だんだんわからなくなっていきました。\n\n## 混同していたこと②：「気のせい」と「体の変化」の線引き\n\nふたつめは、自分でも半信半疑だったことです。\n\n不調があっても、「気のせいかもしれない」「気にしすぎかもしれない」と、自分で打ち消すクセがありました。とくに、はっきり熱が出るとか痛むとかではない、ぼんやりした不調ほど、そう思いがちでした。\n\nでも、気のせいで片付けていいのか、からだの変化として受け止めたほうがいいのか、その線引きを自分でするのは無理があったんです。素人の私が「これは気のせい」「これは更年期」と仕分けしようとするほど、かえって迷路に入っていきました。\n\n結局わかったのは、**その線引きは、自分ひとりで抱えてやることじゃなかった**ということです。\n\n## 混同していたこと③：記録すれば全部わかる、と思っていた\n\nみっつめは、少し反省を込めて。\n\n体調メモをつけ始めた頃、私は「記録さえすれば、原因が自分でわかるはず」と期待していました。たしかに、記録は役に立ちました。自分の不調に波があることや、体調のゆらぎがあることは、見えるようになった。\n\nでも、記録が教えてくれるのは「いつ、どんなふうにしんどかったか」までです。それが更年期によるものなのか、生活習慣なのか、別の理由なのか——そこから先は、記録をながめているだけではわかりませんでした。\n\n記録は、原因を突き止める道具ではなくて、**相談するときに持っていく手土産**だったんだと、今は思っています。\n\n## 混同をほどいてくれたのは、相談だった\n\nじゃあ、この混同をどうほどいたのか。\n\n私の場合は、体調メモを持って婦人科・更年期外来に相談に行ったことが、ひとつのきっかけでした。自分では「全部ごちゃまぜの不調」だったものを、話を聞いてもらいながら少しずつ言葉にしていく中で、頭の中が整理されていった感覚がありました。\n\n何がどの不調なのか、その仕分けは私がここに書くべきことではありません。ただ、**ひとりで箱に放り込んで我慢するのと、誰かに話しながら整理するのとでは、全然違った**ということだけは書けます。混同したまま抱えているより、ずっと気持ちが軽くなりました。\n\n## 「わからない」を、そのまま持っていっていい\n\n整理すると、当時の私に必要だったのは、答えを自分で出すことではありませんでした。\n\n- **全部を「更年期」や「歳のせい」で片付けない**：本当は休めば治るものまで我慢しないために\n- **「気のせい」と自分で打ち消さない**：線引きは、自分ひとりでやらなくていい\n- **記録は、相談の手土産にする**：原因を自分で突き止める道具ではなく\n\n「何がなんだかわからないんです」。その\"わからない\"を、そのまま相談先に持っていっていい。むしろ、きれいに整理してから行かなきゃ、と思わなくてよかったんだと、あとから思いました。\n\n同じように、自分の不調をぜんぶ同じ箱に入れて我慢している人に、この記事が届いたらうれしいです。わからないままでいい。その\"わからない\"ごと、相談できる場所があると、私は思っています。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"11","title":"婦人科に相談してから、変化を感じるまでの記録","category":"婦人科・検診","isHub":false,"wordCount":1652,"body":"婦人科に行けば、その日ですっきり解決する。相談する前の私は、どこかでそう思っていました。\n\n実際は違いました。**本当の始まりは、相談したあとにありました。**\n\nこの記事は、はじめて更年期のことで婦人科に相談してから、自分の中で「少し変わったかもしれない」と思えるまでの、数ヶ月の記録です。最初にお伝えしておくと、これは医療情報ではありません。私ひとりの体験談で、からだの反応や感じ方は人によって大きく違うようです。何かを試すかどうか、続けるかどうかは、必ず医師と相談して決めてください。\n\n同じように、相談したあとの「これで合っているのかな」を過ごしている人に、少しでも届いたらうれしいです。\n\n## 相談した直後は、正直まだ半信半疑だった\n\n最初に婦人科で話を聞いてもらったとき、気持ちはたしかに軽くなりました。「気のせいじゃなかったんだ」と思えたからです。\n\nでも、家に帰ると別の不安が始まりました。相談しただけで、からだが急に変わるわけではない。ほてりや眠りの浅さは、次の日も同じようにありました。\n\nこのとき私は、自分の小さな変化に、以前より敏感になっていました。今日は少しマシかも、いや昨日のほうがよかった気がする、と一日の中で何度も採点していました。今振り返ると、**この時期の観察は、安心するためというより不安を確かめるための観察になっていた**気がします。\n\n## 「すぐには変わらない」と言われて、少し楽になった\n\n私の場合、医師から言われて印象に残っている言葉があります。「変化を感じる人でも、少し時間がかかることが多いですよ」という趣旨のことでした。\n\n正確な効果の話ではなく、あくまで「焦らなくていい」という文脈での言葉として、私は受け取りました。それでも、私にはこれがありがたかったんです。\n\nというのも、それまでの私は「相談したのに変わらない=意味がなかった」と考えて、一週間で結論を出そうとしていたからです。時間がかかるものだと知っただけで、毎日の採点をやめられました。\n\n## 記録をつけていたから、あとで気づけた\n\nこのとき役に立ったのが、体調のメモでした。\n\nほてりの回数や、眠れた・眠れなかった、気分の上下。毎日10秒だけ、生理管理アプリのメモ欄に残していました。その日その日だと変化なんて分かりません。でも、しばらく経ってから見返したとき、**「そういえば最近、夜中に目が覚める回数が減ったかもしれない」**と、はじめて気づけたんです。\n\nこれは「良くなった」という断定ではありません。私の場合は、記録がなければ気づけなかったくらいの、ゆるやかな変化だったというだけの話です。日によって波もありました。\n\n## 変わったのは、からだより先に「気持ち」だったかもしれない\n\n正直に書くと、はっきり「ここが良くなった」と言い切れるものは、私の中にはありません。\n\nただ、確実に変わったことがひとつあります。それは、**不調を感じたときに「どうしよう」と一人で抱え込まなくなった**ことです。次の受診で話せばいい、相談できる場所がある、と思えるだけで、同じ症状でも受け止め方が変わりました。\n\nからだの変化がゆるやかだったぶん、私にとっては、この気持ちの変化のほうが大きかったのかもしれません。\n\n## 今、相談したあとを過ごしている人へ\n\nこの記事を読んでいる人の中には、「相談したのに、まだ何も変わらない」と焦っている人がいるかもしれません。あの頃の私と同じように。\n\nでも、変化のスピードも、感じ方も、人によって違うようです。だから、数日や一週間で結論を出さなくていい。そして、途中で不安になったら、自己判断で我慢したりやめたりせず、相談した婦人科にもう一度聞いていいんだと、私は思っています。\n\n私の場合は、記録と、次に相談できる場所があること。この二つが、変化を待つ時間を支えてくれました。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"12","title":"子宮頸がん検診、受けてみたら気持ちが軽くなった話","category":"婦人科・検診","isHub":false,"wordCount":1493,"body":"「検診、そろそろ受けなきゃな」\n\nそう思ってから実際に受けるまで、私はずいぶん長い時間、先延ばしにしていました。\n\n今日は、子宮頸がん検診をなかなか受けられなかった私が、やっと受けて、そして拍子抜けするほど気持ちが軽くなった話を書きます。結果の話は書きません。あくまで「受けてみた」体験と、そのときの気持ちの記録です。同じように迷っている人の、最初の一歩が少しでも軽くなったらうれしいです。\n\n## 先延ばしにしていた理由\n\n自治体からの案内は、毎年のように届いていました。冷蔵庫に貼って、そのまま気づけば期限が過ぎている。そんなことを何年か繰り返していました。\n\nなぜ動けなかったのか、正直に並べます。\n\n**なんとなく怖かった。** 何か見つかったらどうしよう、という気持ち。受けなければ「たぶん大丈夫」のままでいられる気がしていました。\n\n**忙しさを言い訳にしていた。** 仕事に家のこと。自分のための半日を、いちばん後回しにしていました。予約の電話をかける、その一本すら「また今度」にしていたんです。\n\n**久しぶりで、勝手が分からなかった。** 前に受けたのがいつだったか思い出せないくらいで、今さら受けに行くのが少し気まずい気もしていました。\n\nたぶん、このどれかで止まっている同世代、多いんじゃないかと思います。\n\n## 予約の電話が、いちばん重かった\n\n重い腰を上げたきっかけは、更年期のことで婦人科に相談したことでした。ついでに、と言うと軽いですが、「せっかくだから検診も」と背中を押してもらえたんです。\n\n正直、当日よりも予約の電話のほうがずっと緊張しました。でも、かけてしまえば「検診をお願いしたくて」と言うだけで、あとは向こうが日程を案内してくれました。数年迷った時間に比べたら、電話は一分で終わりました。\n\n## 当日は、思っていたより淡々と終わった\n\n当日のことは、詳しくは書きません。ただ、私の正直な感想を書くなら「あれだけ身構えていたのは何だったんだろう」でした。\n\n受付で気まずい説明をする場面もなく、スタッフの方は淡々と、でも丁寧に進めてくれました。私が事前に完璧に予習しておく必要も、まったくありませんでした。\n\n数年ぶりで緊張していた私に、「久しぶりでも全然大丈夫ですよ」と言ってもらえたのも、地味にほっとしたことのひとつです。\n\n## 受けたあとに感じた、荷物を下ろした感覚\n\n検診が終わって外に出たとき、私の足取りは思いのほか軽くなっていました。\n\n結果がどうこうではなく、**「ずっと後回しにしてきたことを、やっと一つ片づけた」**という感覚です。冷蔵庫に貼ったまま見て見ぬふりをしてきた案内が、心のどこかでずっと小さな重りになっていたんだと、下ろしてはじめて気づきました。\n\n受けたことそのものが、私にとっては「自分のからだを後回しにしなかった日」でした。それだけで、この数年ずっと払い続けていた小さな不安の支払いが、いったん止まった気がしたんです。\n\n## 迷っている人へ\n\nもし今、何年か前の私みたいに、案内を見ては「また今度」を繰り返している人がいたら。\n\n完璧なタイミングを待たなくて大丈夫です。何かのついでで、婦人科に行く用事のときに一緒に。あるいは、予約の電話を一本かけるだけ。そこから先は、向こうが案内してくれます。\n\n久しぶりでも、勝手が分からなくても、大丈夫でした。少なくとも私の場合は、受けたあとの気持ちの軽さのほうが、受ける前の重さよりずっと大きかったです。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"13","title":"更年期の話を、夫に前もってできますか？できなかった私の話","category":"パートナー・家族","isHub":false,"wordCount":1603,"body":"「体調のことは、早めに話しておいたほうがいい」\n\n正論です。反論の余地もありません。でも、少し前の私にはできませんでした。\n\n今日は「ちゃんと話し合いましょう」と呼びかける記事ではなくて、**長年連れ添った夫にすら、なぜか前もって話せなかった私が、どうしてできなかったのか。そして今はどうしているのか**の話です。今まさに言えずにいる人を、責めない記事にしたいと思っています。\n\n## 言えなかった理由を、今なら言葉にできる\n\n十何年も一緒にいる相手なのに、更年期の話を先に切り出せなかった。その理由を、整理するとこの三つでした。\n\n**「大げさだ」と思われるのが怖かった。** まだ症状がはっきりしていない段階で、「更年期かもしれない」と口にするのが、なんだか自分から老けを認めるようで、言いそびれていました。\n\n**心配をかけたくなかった。** 夫にも仕事や家のことがあります。私の不調をひとつ増やすことで、家の空気を重くしたくない、という気持ちがありました。\n\n**そもそも、言葉を持っていなかった。** 「最近こういう不調があって」を、深刻になりすぎず、でも軽すぎずに伝える言い回しを、私はひとつも持っていませんでした。\n\nどれも、今振り返れば「そんなことで」と思えます。でも当時の私には、どれも本物の壁でした。\n\n## 我慢して過ごした時期に、気づいたこと\n\n言えないまま過ごしていた時期、私は不調を一人で抱えて、その分だけ機嫌が悪くなっていました。\n\n理由を言っていないので、夫からすれば「最近なんだか怒りっぽい」だけに見えていたと思います。あとから聞くと、心配はしていたけれど、どう聞いていいか分からなかったそうです。\n\nつまり、言わなかったことで、私は一人で不調を抱え、相手は相手で理由の分からない距離に戸惑っていた。**「言えない」の代償を、二人で別々に払っていた**んだと、あとになって気づきました。\n\n## 私が最初に言えた、ひとこと\n\nきっかけは、たいしたことではありませんでした。ある夜、たまたま二人で座っていたときに、思い切って言ったんです。\n\n「最近ちょっと体調が不安定で、更年期かもしれないと思ってる」\n\n深刻な相談として切り出すと重くなりそうだったので、天気の話くらいの軽さで言うことを心がけました。私の場合は、面と向かってより、横に並んでいるときのほうが言いやすかったです。\n\n夫の反応は、拍子抜けするくらい普通でした。「そうなんだ、無理しないでね」くらい。私が数ヶ月ためこんでいた重さは、伝えた瞬間にずいぶん軽くなりました。ただ、これはあくまで私の場合で、反応は人によって違うと思います。\n\n## 「察してほしい」を、いったん手放した\n\n伝えるようになって気づいたことがあります。\n\n私はどこかで、「言わなくても察してほしい」と思っていました。長年一緒にいるんだから、と。でも、**からだの中で起きていることは、言葉にしない限り相手には見えない。** 当たり前のことなのに、これを認めるのに時間がかかりました。\n\n察してもらうことを待つのをやめて、こちらから一言だけ状況を渡す。それだけで、家の中の空気は少し変わりました。全部を分かってもらう必要はなくて、「今こういう時期らしい」が共有できていれば十分だったんです。\n\n## 言えなかった頃の私へ\n\n最後に、言えなかった頃の自分に向けて書きます。\n\n言えなかったのは、あなたが弱いからでも、我慢が足りないからでもない。老けを認めるようで怖かっただけ、相手に心配をかけたくなかっただけ。どちらも、やさしさの裏返しみたいなものです。だから、責めなくていい。\n\nそして、これから伝えるのに、遅すぎることはありません。天気の話くらいの軽さで、一言だけ。私はそこから始めました。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"14","title":"婦人科で相談を始めて3ヶ月。変わったこと、戸惑ったこと","category":"婦人科・検診","isHub":false,"wordCount":1675,"body":"更年期のことで婦人科に通い始めて、3ヶ月が経ちました。\n\nきっかけは、はじめての相談のときに「気になることがあれば、また来ていいですよ」と言ってもらえたこと。あの一言を口実に、私は「通う」ことを始めました。\n\nこの記事は、その3ヶ月の記録です。先にお断りしておくと、これは医療情報ではなく、私ひとりの体験談です。相談の中で何をどうするかは人によって大きく違うようですし、合う・合わないもさまざまだと聞いています。「こうすればいい」とおすすめする記事ではなく、「私の場合はこうだった」の記録として読んでもらえたらうれしいです。\n\n## 戸惑ったこと①：「通い続ける」が意外とむずかしい\n\n始める前の私は、正直なめていました。ときどき相談に行くだけでしょ、と。\n\nこれが、思ったより続けるのが大変でした。仕事の予定、家のこと、子どものこと。自分の受診の予定は、いつも真っ先に「また今度」の候補になるんです。\n\n私が今やっている対策です。\n\n- **次の予約を、帰りに入れる**：家に帰ってから予約しようとすると、まず忘れます\n- **仕事の予定表に、自分の受診も書く**：他人との約束と同じ扱いにしないと、私は優先しませんでした\n- **アプリに記録を残す**：受診日と、話したことのメモを残すと、次の相談で話が早いです\n\n## 戸惑ったこと②：「この程度で相談していいのか」問題\n\n通い始めてしばらく、私はずっと迷っていました。\n\nほてりや気分の波はあるけれど、日常生活が送れないほどではない。「この程度で相談するのは、大げさなんじゃないか」という気持ちが、なかなか消えなかったんです。\n\nでも、あるとき思い切って小さな不調も話してみたら、医師は普通に聞いてくれました。**様子を見ていい範囲と、気になったら早めに相談したほうがいいサインを教えてもらえた**だけで、同じ症状でも安心して過ごせるようになりました。相談していい範囲は、思っていたよりずっと広かったです。\n\n具体的にどういう対応をとったかは、人によって違うようなので、ここには詳しく書きません。書きたいのは、自己判断で我慢せずに相談してよかった、ということのほうです。\n\n## 変わったこと：仕事とのつき合い方\n\n3ヶ月経って、私の生活で変わったことを、仕事と家庭を中心に書きます。\n\nまず仕事です。以前は、調子の悪い日も「気合いで乗り切る」しかありませんでした。今は、**あらかじめ「不調の波が来るかもしれない時期」をなんとなく把握できるようになった**ぶん、大事な予定を無理に詰め込まないようにしています。\n\nこれは症状がどうこうという話ではなく、単純に「自分のからだの状態を、前より気にかけるようになった」という変化です。予定を組むときに、自分のコンディションを一つの要素として数えるようになりました。\n\n## 変わったこと：家の中の空気\n\n家庭でも、小さな変化がありました。\n\n通い始めたことを家族に伝えてから、「今日は病院の日」と口に出せるようになりました。理由の分からない不機嫌ではなく、「そういう時期で通っている」が共有されているだけで、家の空気はずいぶん楽になった気がします。\n\n**婦人科が「困ったときに駆け込む場所」から「定期的に通う場所」に変わった**のも、この3ヶ月の大きな変化でした。かかりつけって、こうやってできていくんだなと実感しています。\n\n## 迷っている人へ\n\n3ヶ月通ってみての正直な感想は、「劇的に何かが解決したわけではないけれど、一人で抱えなくてよくなった」です。\n\nからだの変化そのものは、あえてここに書きません。人によって本当に違うようですし、私の例がだれかの期待や不安になるのは違うと思うからです。気になる人は、医師に聞いてください。\n\n迷っているなら、通うと決めなくてもいい。「一度、相談に行くかどうか」だけ決めればいいと、私は思っています。続けるかどうかは、話してみてから考えられます。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"15","title":"「自分のからだを後回しにしない」って、具体的にどういうこと？私の7つの習慣","category":"セルフケア・理念","isHub":false,"wordCount":1751,"body":"このnoteで何度も書いている「自分のからだを後回しにしない」という言葉。\n\n実は最初、自分でもよくわかっていませんでした。からだの変化に向き合おうと決めた日のことは覚えているのに、じゃあ具体的に何をするの？と聞かれたら、答えられなかったと思います。\n\nあれから時間が経って、少しずつ「これのことだったのか」と思える習慣が増えてきました。今日はそれを7つ、書き出してみます。40代以降の、仕事も家のこともある毎日の中でも続けられる、大げさじゃないものばかりです。\n\n## 私の7つの習慣\n\n**①記録する**\n\n体調、気分、眠り、そして生理の変化。私のセルフケアは、ぜんぶここから始まりました。記録があると、不調に「波」や「パターン」が見えてきます。婦人科で話が早いのも、記録のおかげです。1日10秒のアプリ入力から始めました。\n\n**②不調を「歳のせい」で片づけない**\n\nだるい日やイライラする日、以前の私は「もう歳だから」で終わりにしていました。今は「相談していい変化かもしれない」と呼び直しています。呼び方を変えただけで、我慢や我流の対処が当たり前ではなくなりました。加齢そのものを卑下する言葉を、自分にかけないようにしています。\n\n**③相談先リストを持つ**\n\nかかりつけの婦人科、更年期外来、オンライン診療、自治体の窓口。「何かあったらどこに行くか」を、元気なうちに決めてスマホにメモしてあります。不調のさなかにゼロから探す心細さは、一度経験すれば十分です。\n\n**④年に一度の検診を、先に予約する**\n\n「そのうち行こう」の「そのうち」は永遠に来ないと学んだので、行った帰りに次の予約を入れるか、誕生月に行くと決めています。案内を冷蔵庫に貼って期限を切らす日々とは、これでお別れできました。\n\n**⑤ケアにかかるお金を「必要経費」と呼ぶ**\n\n受診費、薬代、検診の費用。以前は「余計な出費」の顔をしていたこれらを、家計の中で「必要経費」に昇格させました。化粧品や美容院と同じ枠です。お金の呼び方は、自分の扱い方に直結していると思います。\n\n**⑥予定を断る練習**\n\n体調がすぐれない日に、無理して詰め込んだ予定で、いいことがあった記憶がありません。「ごめん、今日は体調優先で」と言う練習を、小さな約束から始めました。家族にも、言えるようになってきました。\n\n**⑦「あとで調べよう」を、今調べる**\n\n気になる症状、更年期のこと、検診のこと。「あとで」と思ったものは、その場で3分だけ調べるようにしています。知識は、不調のさなかではなく、落ち着いているときにしか蓄えられないと気づいたからです。\n\n## できない週があっていい\n\n7つ書きましたが、全部できている週なんてありません。\n\n記録は三日坊主を何周もしているし、断れずに無理した日も普通にあります。それでいいと思っています。\n\n**「後回しにしない」は、完璧にやることではなくて、後回しにした自分に気づいて、また戻ってくること。** 戻る場所として、この7つがある感じです。\n\n## 「後回しにしない」は、自分への態度の話\n\n結局この言葉は、何かのタスクの話ではなくて、**自分を自分の予定表に入れるかどうか**という態度の話なんだと思います。\n\n仕事の締切、家族の用事、子どもの予定。他人に関わる約束は予定表に書くのに、自分のからだのことだけは、いつも空いた時間の残り物でやろうとする。それをやめる、ということ。\n\nからだの変化に戸惑っていた頃の私は、自分の予定表に自分がいない生活をしていました。今は、月に数個ですが「自分のからだ」の予定が入っています。それだけで、毎日の安心感は変わりました。\n\n## 読んでくれているあなたへ\n\n7つのうち、どれかひとつでも「これならできそう」と思えるものがあったら、それだけ持ち帰ってください。全部やる必要はありません。私のおすすめは①の記録です。10秒でできて、あとから全部の土台になるので。\n\nからだの変化と向き合い始めた頃のことは、ほかの記事にも書いています。これからも、ゆっくり書いていくので、よかったらたまに覗きにきてください。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"16","title":"オンライン診療、初めて使ってみた。仕事がある日の流れと正直な感想","category":"相談先・オンライン診療","isHub":false,"wordCount":1812,"body":"このアカウントで何度か「オンライン診療という方法もあるようです」と書いてきましたが、白状すると、書いていた頃の私はまだ一度も使ったことがありませんでした。\n\n先日、初めて使いました。更年期外来で相談していることの経過確認で、どうしても平日に半日休みが取れない月があったからです。\n\n今日はその体験記です。先にお断りしておくと、オンライン診療の流れや対応内容はサービスやクリニックによって違うようです。これは私が使ったひとつの例の話として読んでください。特定のサービスをすすめる記事ではありません。\n\n## 「仕事を休めない」がずっと言い訳だった\n\n40代になってから、通院はずっと後回しでした。理由はいつも同じで、仕事です。\n\n半日休むと、その分の業務が翌日に積み上がる。家に帰れば家のこともある。「今月は忙しいから来月でいいや」を、私は何ヶ月も繰り返していました。\n\nだからオンライン診療を知ったときも、「便利そうだけど、私みたいなアナログな人間には難しそう」と、勝手にハードルを上げていました。実際に使ってみたら、その思い込みのほうが古かったです。\n\n## 私の場合の流れ\n\n私が使ったときの流れは、ざっくりこうでした。\n\n**①予約**：スマホでクリニックのサイトから日時を選択。夜、家事が一段落したあとに予約操作ができたのが、まずありがたかったです。思い立ったときに動けるので。\n\n**②事前問診**：予約後、問診フォームに入力。体調、飲んでいる薬、相談したいこと。対面の問診票と同じような内容を、自宅のテーブルで書ける感覚でした。\n\n**③ビデオ診察**：予約時間に着信が来て、医師と画面越しに話しました。私の場合は、これまでの経過と今の体調の確認が中心で、時間は短め。「対面より雑」という感じはなく、聞きたいこともちゃんと聞けました。\n\n**④薬の受け取り**：私の場合は自宅への配送を選びました。数日で、中身がわからない梱包で届きました。近くの薬局で受け取る形を選べる場合もあるようです。\n\n全体を通して、家から一歩も出ていません。不思議な体験でした。\n\n## 仕事がある日でも、昼休みに収まった\n\nいちばん驚いたのは、時間のことでした。\n\n対面だと、私の場合は移動と待ち時間で半日仕事です。それが、昼休みの中に収まってしまった。午後の会議にも普通に出ました。\n\n**「便利になると、後回しにする言い訳が消える」**というのが、使ってみての実感です。「忙しいから来月」の「忙しいから」が使えなくなる。経過の相談を続けたい私には、この相性はとても良かったです。\n\n## 戸惑ったこと・限界だと感じたこと\n\nいいことばかり書くのはフェアじゃないので、正直に書きます。\n\n**画面越しの緊張感は、対面と種類が違う。** 通信が途切れたらどうしよう、というそわそわが最初はありました。2回目からは慣れると思います。\n\n**からだを直接診てもらうことは、できない。** 当たり前ですが、画面越しでは検査も触診もできません。私のときも「こういう症状があるときは対面で受診してください」という案内がありました。オンラインは万能ではなく、対面の代わりになる場面と、ならない場面があります。\n\n**初めての相談は、対面のほうが安心かもしれない。** 私がスムーズに使えたのは、すでに対面のかかりつけがあって、「経過」の相談だったからだと思います。ゼロからの相談だったら、私は対面を選んだ気がします。\n\n## 私なりの使い分け\n\n今の私の整理はこうです。\n\n- **オンライン**：経過の相談、話が中心のとき、仕事が休めない月\n- **対面**：初めての相談、検査が必要かもしれないとき、じっくり診てほしいとき\n\n要は、オンラインと対面は「どちらが上か」ではなく、用途の違う道具でした。仕事や家庭で時間が取りにくい世代こそ、入口が増えるのはありがたいことだと思います。\n\n## 気になっている人へ\n\nオンライン診療、使う前の私は「なんとなく不安」の塊でした。使ってみた今は、「対面の簡易版」ではなく「別の入口」だと感じています。\n\n仕事や家のことで時間が取れなくて、自分のからだのことだけずっと後回しにしている。もしそんな心当たりがあるなら、選択肢のひとつとして調べてみてもいいかもしれません。\n\n同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"17","title":"生理不順で仕事を休むと言えなかった私が、変えたこと","category":"更年期症状・からだ","isHub":false,"wordCount":1595,"body":"40代に入ってから、生理の周期がバラバラになりました。\n\n早く来る月もあれば、飛ぶ月もある。量も、体調も、以前とは違う。そしてときどき、どうしても動けない日がやってきます。\n\nそういう日、私は仕事を休みたいと思いながら、いつも別の理由を探していました。「風邪気味で」「ちょっと熱っぽくて」。今日は、その言い換えをやめてみた話です。\n\n## なぜ本当の理由を言えなかったのか\n\n振り返ると、生理まわりの不調で休むと言えなかった理由は、いくつもありました。\n\n**恥ずかしさがあった。** いい大人が、からだのことでこんなに左右されるなんて、と思っていました。若い頃はもっと平気だったのに、という気持ちもありました。\n\n**「更年期のせい」と思われたくなかった。** これがいちばん大きかったかもしれません。年齢のことに触れられるのが怖くて、いっそ風邪ということにしたほうが楽だったんです。\n\n**周りに同じ世代がいなかった。** 職場で気軽にこの話をできる相手がいなくて、ひとりで抱えるうちに、言うこと自体をあきらめていました。\n\nどれも、それっぽい理由です。でも今見ると、ぜんぶ「言わずに済ませるための理由」であって、「言ってはいけない根拠」ではありませんでした。\n\n## 嘘の理由を重ねるのが、しんどくなった\n\nきっかけは、大きな出来事ではありませんでした。\n\nある月、また「熱っぽくて」と言って休んだあと、ふと疲れてしまったんです。本当の理由を隠すために、毎回もっともらしい嘘を組み立てている自分に。\n\nからだがつらいだけでも大変なのに、その上で言い訳まで考えている。二重に消耗していました。**私が守りたかったのは体裁で、そのために自分を追い込んでいたんだな**と、そのとき気づきました。\n\n## 全部は言わなくていい、と気づいた\n\nでは、洗いざらい「生理不順で更年期かもしれなくて」と説明しなければいけないのか。私はそうは思いませんでした。\n\n私が選んだのは、その中間でした。細かい事情は言わない。でも、嘘もつかない。\n\n具体的には、こんな言い方に変えました。「体調の都合で、今日はお休みをいただきます」「女性特有の体調で、少し休ませてください」。私の場合は、これで十分伝わりました。相手も、それ以上は聞いてきませんでした。\n\n大事だったのは、**病名や年齢を明かすことではなく、「私はこれを我慢しなくていい」と自分で決めること**でした。\n\n## 伝え方を変えて、変わったこと\n\n言い方を変えてから、いくつか変化がありました。\n\n**罪悪感が減った。** 嘘をついていないので、後ろめたさがない。これだけで、休んだ日の気持ちがずいぶん軽くなりました。\n\n**記録を持てるようになった。** 本当の理由で休むようになったので、「この時期に不調が出やすい」というパターンを自分で把握できるようになりました。婦人科で相談するときにも、その記録が役に立ちました。\n\n**同じ世代の同僚と、少しだけ話せた。** 私が隠さなくなったことで、「実は私も…」と打ち明けてくれた人がいました。みんな、それぞれ黙って耐えていたんだな、と知りました。\n\nもちろん、職場の空気は人それぞれだと思います。私の場合はうまくいっただけで、「こう言えば大丈夫」という正解ではありません。\n\n## 「言えない」で抱えている人へ\n\nもし今、生理まわりの不調を別の理由に言い換えて、こっそり乗り切っている人がいたら。\n\n全部を説明する必要はありません。でも、自分に嘘をついてまで我慢する必要も、ないと思うんです。\n\nまずは、諦めた予定や休んだ日を記録してみることからでもいい。それがたまってきたら、「私はこれを我慢しなくていいのかもしれない」と、自分に許可を出してあげてください。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"18","title":"家族にバレたくない。同居家族がいる中で通院が必要になった私が考えたこと","category":"パートナー・家族","isHub":false,"wordCount":1714,"body":"更年期外来に通うと決めたとき、私にはひとつ、地味だけど大きな悩みがありました。\n\n**同居している家族に、あまり知られたくない。**\n\n夫、そして年頃の子ども。毎日顔を合わせる家族がいる中で、自分のからだのことをどこまで見せるか。今日はその、少し言いづらい話を書きます。\n\n最初にお断りしておくと、これは「こうすれば隠せる」というマニュアルではありません。隠すか、伝えるか。その間で揺れた、私の記録です。\n\n## なぜ「知られたくない」と思ったのか\n\n冷静に考えれば、更年期は悪いことでも恥ずかしいことでもありません。それでも「あまり知られたくない」と思った理由を、今なら言葉にできます。\n\n**心配をかけたくなかった。** 家族が私の体調を気にして、気を遣う。その空気を作ってしまうのが申し訳なかった。\n\n**「更年期の母親」として扱われたくなかった。** 子どもに、そういう目で見られるのが少し怖かった。イライラした日に「更年期でしょ」と片付けられるのが、想像するだけで嫌でした。\n\n**単純に、自分のペースで向き合いたかった。** まだ自分でも整理がついていないことを、先に家族と共有したくなかったんです。\n\n同じ気持ちの人、きっといると思います。そして先に言っておくと、**家族にすぐ言えないことは、悪いことではありません。** 家庭の空気はそれぞれで、話せないのはあなたのせいではないからです。\n\n## 隠そうとして、かえって疲れた話\n\n最初の頃、私は通院をこっそり済ませようとしていました。\n\n家族が出払っている時間に予約を取り、薬は自分のバッグの奥にしまい、領収書はすぐ処分する。検索履歴が子どもに見られないよう、そんなことまで気にしていました。\n\nでも、しばらくして疲れてしまったんです。**からだのことで通っているだけなのに、まるで悪事を隠しているみたいな気分**になっている自分に。守りたかったのは自分のペースだったのに、隠すことそのものがストレスになっていました。\n\n## 「全部話す」と「全部隠す」の間を探した\n\nそこで私が考え直したのは、選択肢は二つだけじゃない、ということでした。\n\n全部打ち明けるか、完全に隠すか。その両極じゃなくて、間があっていい。私はそう思うことにしました。\n\n私が最終的に選んだのは、こんな距離感です。\n\n- **夫には、ざっくり伝える。** 病名や細かい症状ではなく、「更年期のことで病院に通い始めた。ときどき体調が波打つかも」とだけ。理由は、通院で家事や予定を調整する場面が出てくるからです。\n- **子どもには、あえて詳しくは言わない。** ただ、「体調で休みたい日がある」ことだけは、隠さないことにしました。心配させたくない気持ちと、隠しきる無理と、その折り合いです。\n\nこれはあくまで私の場合の線引きです。家族の年齢や関係性によって、ちょうどいい距離は違うと思います。\n\n## 夫に伝えたら、拍子抜けした\n\n正直、夫に言うのはいちばん緊張しました。でも結果は、拍子抜けでした。\n\n「そうなんだ。無理しないで、行きたいときに行きなよ」。返ってきたのは、それだけでした。\n\n長く一緒にいても、からだの話はしてこなかった相手です。だからどう反応されるか読めなかった。でも、伝えてみたら、隠していた数ヶ月がなんだったんだろうと思うくらい、あっさり受け止められました。\n\nもちろん、反応は人それぞれだと思います。うまく伝わらないこともあるでしょう。それでも私の場合は、「言わないままモヤモヤを抱える」より、伝えたほうがずっと楽になりました。\n\n## 「バレたくない」で抱えている人へ\n\n同居家族がいる中で、こっそり自分のからだと向き合おうとしている人へ。\n\n隠したいと思うのは、わがままでも弱さでもありません。ただ、隠すこと自体に疲れてしまったら、思い出してほしいんです。**「全部話す」か「全部隠す」かの、間にある伝え方**があることを。\n\n誰に、どこまで、どう伝えるか。その線引きは、あなたが決めていい。伝えないと決めるのも、ひとつの選択です。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"19","title":"「婦人科以外の相談先」ってあるの？気になって調べてみた","category":"相談先・オンライン診療","isHub":false,"wordCount":1968,"body":"からだの調子が揺らぎ始めた40代。「これ、どこに相談すればいいんだろう」と迷う場面が、私は一気に増えました。\n\n婦人科に行くほどの症状なのか。かかりつけの内科でいいのか。そもそも何科なのかもわからない。そんなふうに、相談先そのものに迷うことが多かったんです。\n\nそこで気になったのが、「婦人科以外に、からだのことを相談できる場所ってあるの?」という素朴な疑問でした。今日は、それを調べてみた記録です。特定の場所をすすめる記事ではなく、「こういう選択肢があるらしい」という私の調べメモとして読んでください。\n\n## そもそも、なぜ婦人科以外を探したのか\n\n婦人科に行けばいいのは、頭ではわかっていました。それでも別の入口を探したのには、理由があります。\n\n**予約が取りにくく、待ち時間が長い。** 仕事や家のことがある中で、半日仕事の通院はやっぱり負担でした。\n\n**「病院に行くほどか」と迷う症状が多い。** はっきりした痛みではなく、なんとなくの不調。この程度で婦人科は大げさかな、と足が止まる。\n\n**人目が気になる。** 地域のクリニックだと、待合室で知り合いに会うかもしれない。そんな心配もありました。\n\nつまり私は、婦人科が嫌だったのではなくて、**もう少しハードルの低い入口はないか**を探していたんだと思います。\n\n## 更年期外来という選択肢\n\n調べていて、まず知ったのが「更年期外来」でした。\n\n婦人科の中にあることも、専門の外来として独立していることもあるようです。更年期の症状に絞って相談できる場所、という理解を私はしました。\n\n私の印象では、「更年期かもしれない」とうっすら思っている人にとっては、一般の婦人科より入口として入りやすいかもしれない、と感じました。名前の時点で、相談していい場所だとわかるからです。ただ、どこにあるか、予約が取れるかは地域差があるようなので、そこは調べてみないとわかりませんでした。\n\n## オンライン診療という入口\n\n次に見かけたのが、オンライン診療でした。\n\nスマホやパソコンで、医師と画面越しに相談する形です。私自身も後日実際に使ってみて、仕事がある日でも受診できたのは大きな発見でした。\n\n**待合室が存在しないので、人目の心配がない。移動時間もゼロ。** これは、人目や時間がネックだった私には、かなり刺さりました。\n\nただ、画面越しでは検査も触診もできません。初めての相談や、しっかり診てほしいときは、対面のほうが安心な場面もあると思います。オンラインは万能ではなく、用途の違う入口、というのが私の受け取り方です。\n\n## パーソナルケアクリニックというもの\n\n調べる中で、「パーソナルケアクリニック」という名前も見かけました。\n\n私の理解では、女性のからだにまつわる「病気未満」も含めた悩みを相談できる場所、という印象です。生理の悩みやデリケートゾーンのケアなど、「これ、どこに相談すれば?」と迷いがちなテーマの受け皿として設計されている場所のようでした。オンライン対応をしているところもあるようです。\n\nただ、クリニックによって内容も雰囲気もさまざまなようで、「ここなら絶対安心」という場所はどこにもないと思います。私は、これを**「婦人科・オンライン診療と並ぶ、選択肢のひとつ」**として、頭の片隅に置いています。もし使うとしたら、料金がサイトに明示されているか、強引な勧誘がないか、といった点は自分で確認すると思います。\n\n（参考）私が調べたときに見たパーソナルケアクリニックのページです。\nhttps://personalcareclinic.jp/\n※紹介料などは受け取っていません。受診をすすめるものではなく、選択肢のひとつとしての情報です。\n\n## 調べてみて、私が思ったこと\n\nいくつか調べてみて、結局いちばん大事だと感じたのは、入口の名前ではありませんでした。\n\n婦人科でも、更年期外来でも、オンラインでもいい。**どの入口を選ぶかより、悩みを放置しないことのほうが大事**だと、私は思うようになりました。\n\n相談先が一つしかないと思うと、そこに行けないときに詰んでしまう。でも、入口が複数あると知っているだけで、「今日はこっちなら行けるかも」と思える。私にとっては、選択肢を知ること自体が、心の余裕につながりました。\n\n## 相談先に迷っている人へ\n\n「どこに相談すればいいかわからない」で止まっている人へ。\n\n正解の入口を探さなくて大丈夫です。今の自分が動きやすい入口から、ひとつ試してみればいい。合わなければ、別の入口に変えればいいだけです。\n\n大事なのは、迷ったまま何もしないでいる時間を、少しずつ減らしていくこと。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"20","title":"「気のせいだよ」と言われた夜、私が返した言葉。体調の変化を伝える勇気について","category":"パートナー・家族","isHub":false,"wordCount":1779,"body":"「気のせいだよ」\n\nこの5文字を、私は今でもはっきり覚えています。からだの不調を家族にこぼしたとき、返ってきた言葉です。\n\n悪気はなかったんだと思います。やわらかい声色でした。でも、私の不安をひとつも受け止めない5文字でした。今日は、あの夜のことと、私がそれにどう返したかの話です。\n\n先に言っておくと、これは家族を責める記事ではありません。ただ、同じ言葉の前で言葉に詰まっている人が、きっと今夜もどこかにいると思うので。\n\n## 「気のせい」って、誰から見た話なんだろう\n\nあとから冷静に考えたことがあります。\n\nあの「気のせいだよ」の根拠は、何だったんだろう。\n\nたぶん、根拠なんてなかったんだと思います。「そんなに変わったように見えない」「大げさなんじゃない」「深刻に考えたくない」。そのどれかで、そのどれもが、**私のからだの外側から見た印象**でした。\n\nほてりで眠れない夜を過ごすのは私。疲れが抜けないまま朝から動くのは私。理由のわからない気分の落ち込みを抱えるのも私。**変化を感じている人と、「気のせい」と言う人が、違う。** この非対称に気づいてから、あの5文字の軽さの正体がわかりました。\n\n家族が冷たかったとは思いません。たぶん、私のからだの内側で起きていることを、想像したことがなかっただけ。でも、想像したことがないこと自体が、すれ違いの根っこなんだと思います。\n\n## 言えなかった頃の私\n\n正直に言うと、昔の私も、不調をうまく言葉にできない人間でした。\n\n心配をかけたくない。大げさだと思われたくない。だから「気のせいだよ」と言われたら、「そうかもね」と流していました。心の中では全然そう思っていないのに、口では引き下がってしまう。\n\nそうやって飲み込んだ不調が、消えるわけではありませんでした。ただ、誰にも共有されないまま、私の中に積もっていっただけでした。\n\n## 私が返した言葉\n\n婦人科で相談を始めて、少し自分のからだのことがわかってきた頃。私は決めていたことがありました。次に「気のせい」と言われたら、返す言葉です。\n\n実際にその場面が来たとき、私はこう言いました。\n\n**「気のせいかどうかは、私のからだが決めることだから」**\n\n説得でも、議論でもありません。主語を「私」にした、事実だけの一言です。\n\nこれを選んだのには理由があります。「気のせいじゃないよ」と反論すると、「大げさ/大げさじゃない」の水掛け論になってしまう。でも「私のからだが決めること」は、誰にも反論できない。私の感じている変化は、私だけが知っているからです。\n\n家族は少し黙って、「……そうだね、ごめん」と言いました。それで、空気が変わりました。あんなに引っかかっていた一言は、返してしまえば数秒のことでした。\n\n## それでも受け止めてもらえないときは\n\n「そう言っても、わかってもらえなかったら?」と思った人へ。\n\nその可能性は、あります。それでも「気にしすぎ」と言う人も、面倒くさそうにする人も、現実にはいると思います。\n\nそのときは、どうか覚えておいてください。**あなたのつらさは、誰かに認めてもらって初めて本物になるものではありません。** 家族が理解してくれるかどうかと、あなたが自分のからだを大事にしていいかどうかは、別の話です。\n\n家族に届かなくても、あなたの不調を仕事にしている人たちがいます。婦人科でも、更年期外来でも、オンラインの相談でもいい。「気のせい」で片付けない人のところに、どうか持っていってください。\n\n## 「伝える勇気」という言葉について\n\n最後に、タイトルに自分で「勇気」と入れておいてなんですが、ひとつ思うことがあります。\n\n本来、自分のからだの不調を家族に伝えるのに、勇気なんて要らないはずです。いちばん近くにいる人たちなのだから。\n\nでも現実には、勇気が要る。その理不尽さの中で、今夜も言葉を探している人がいる。だからせめて、私の一言を置いておきます。使えそうなら、そのまま持っていってください。\n\n「気のせいかどうかは、私のからだが決めること」\n\nあなたが感じている変化は、あなたのものです。誰かの「気のせい」で、なかったことにされていいものではありません。\n\n同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"21","title":"更年期症状、私の場合はこうだった【体験談】","category":"更年期症状・からだ","isHub":false,"wordCount":2031,"body":"「更年期 症状」と検索していたのは、たしか去年のことでした。\n\n仕事の合間、ふとした休憩時間に、スマホでその言葉を打ち込んでいた自分を、今でも覚えています。今日は、そのときの自分に向けて書きます。\n\n最初に、いちばん大事なことを書いておきます。**症状の出方は、人によって本当に違うようです。** この記事は医療情報ではなく、あくまで「私ひとりの場合」の記録です。読んで安心するためではなく、「じゃあ自分の場合はどうか、専門家に聞いてみよう」と思うための材料にしてもらえたらうれしいです。\n\n## 最初に「あれ?」と思ったこと\n\n私の場合、最初の変化は、はっきりした症状というより「なんとなく」でした。\n\n夜、寝つけない日が増えました。それまでは布団に入ればすぐ眠れる人だったのに、天井を見ながら考えごとをしている時間が長くなりました。朝もすっきり起きられなくて、日中に急にからだが熱くなる感覚もありました。\n\nでも当時の私は、それを更年期とは結びつけていませんでした。「仕事が忙しいからかな」「歳のせいかな」と、なんとなく流していたんです。\n\n## 症状より、戸惑いのほうが大きかった\n\n振り返って思うのは、症状そのものより、**「これが自分に起きている」という戸惑い**のほうが大きかった、ということです。\n\n昨日までできていたことが、今日はしんどい。理由がわからない不調に、自分でも自分がよくわからなくなる感覚がありました。家族に「疲れてるだけでしょ」と言われると、そうなのかもしれない、でも違う気もする、と心の中で揺れていました。\n\n私の場合は、その「言葉にできなさ」がいちばんきつかったように思います。\n\n## 仕事を休むかどうかで迷った日\n\nいちばん迷ったのは、体調が重い日に「仕事を休むかどうか」でした。\n\n熱があるわけでも、どこかが痛いわけでもない。ただ、からだが鉛のように重くて、頭がぼんやりする。こういう日に「休みます」と言っていいのか、私には長いあいだ判断がつきませんでした。\n\n結局その日は、無理をして出社しました。でも、あとから思えば、あれは休んでもよかった日だったと思います。**「はっきりした病名がないと休んではいけない」**という思い込みが、私の中にありました。今は、その思い込みを少しずつ手放そうとしています。\n\n## 婦人科に相談してみようと思うまで\n\n決定的なきっかけがあったわけではありません。\n\nただ、不調が数ヶ月続いて、「このまま様子を見る」だけでは何も変わらない気がしてきました。それで、思い切って婦人科に相談してみることにしたんです。\n\n相談してみて、いちばんよかったのは、**「気のせいじゃなかった」と自分の中で整理がついたこと**でした。何がどう改善したか、という話はここには書きません。人によって違うでしょうし、それは専門家と相談して見ていくことだと思うからです。書きたいのは、ひとりで抱えていた不調を、誰かに話せる場所ができたこと自体が、私にとっては大きかった、ということです。\n\n## 「歳のせい」で片付けなくてよかった\n\nいちばん変えてよかったのは、「歳のせいだから仕方ない」で終わらせるのをやめたことです。\n\n以前の私は、不調を感じても「もうそういう歳だし」と自分に言い聞かせて、そこで思考を止めていました。でもそれは、加齢を理由に自分のからだを見ないふりする言い訳になっていた気がします。歳を重ねること自体は、卑下することでも諦めることでもないはずなのに。\n\n「仕方ない」の一言で閉じていた扉を、「一度ちゃんと見てみよう」に置き換えただけで、私の場合は気持ちがずいぶん変わりました。原因がはっきりしなくても、向き合おうとすること自体に意味があったんだと思います。\n\n## 記録をつけて、伝えやすくなった\n\nもうひとつ、私がやってよかったのは、体調を簡単にメモしておくことでした。\n\nどんな日にしんどくなるか、眠れなかった日はいつか。手帳の隅に印をつけるだけです。**自分の感覚を言葉や記録にしておくと、相談するときに伝えやすくなりました。** 「なんとなくつらい」だけだと、自分でも状況がつかめませんでしたが、記録があると「こういう傾向があるみたい」と話せます。\n\n完璧につける必要はありませんでした。三日坊主でも、書いた分だけが手がかりになりました。\n\n## 同じように迷っている人へ\n\n私の「こうだった」は、あなたの「こう」を保証しません。\n\n症状が重い人もいれば、ほとんど気にならないという人もいるようです。だから、この記事を読んで「自分も同じだ」と決めつける必要はないし、「自分は違うから大丈夫」と流す必要もないと思っています。\n\nただ、もし今、名前のつかない不調の中でひとりで検索しているなら。その検索を、専門家への相談に一歩つなげてみてもいいかもしれません。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"22","title":"2度目の不調の波。自分を責めた私が考えたこと","category":"更年期症状・からだ","isHub":false,"wordCount":1926,"body":"一度、落ち着いたと思っていました。\n\n婦人科に相談を始めて、少しずつ生活のリズムが戻ってきて、「もう大丈夫かもしれない」と思っていた頃。しばらくして、また不調の波がやってきました。\n\n今日は、その「2度目の波」で自分を責めてしまった私の話を書きます。\n\n## 「治ったはずなのに」という気持ち\n\n2度目の波が来たとき、1度目とは違う苦しさがありました。\n\n不調そのものより、**「あんなに向き合ったのに、また戻ってしまった」という気持ち**がこたえたんです。せっかくできるようになったことが、またできなくなる。振り出しに戻ったような感覚に、私はしばらく飲み込まれていました。\n\n「私のやり方がまずかったのかな」「もっとちゃんとケアしていれば」。そんな声が、頭の中でずっと鳴っていました。\n\n一度上向いたぶん、下がったときの落差を強く感じたのかもしれません。期待した自分がいたぶんだけ、裏切られたような気持ちになっていました。今思えば、その落差そのものに、必要以上に振り回されていた気がします。\n\n## 自分を責める声の正体\n\nあとになって、あの声の正体を考えてみました。\n\nあの声はつまり、**「一度よくなったら、もう二度と不調は来ないはずだ」という思い込み**でした。よくなったはずのものがまた来たのは、私の努力が足りないからだ、という理屈です。\n\nでも、調べたり相談したりする中で私が感じたのは、からだの調子には波があるようだ、ということでした。私の場合は、良い時期と、そうでない時期が、行ったり来たりするようなイメージでした。一直線に「治って終わり」ではないのかもしれない。そう思えたとき、少しだけ肩の力が抜けました。\n\nもちろん、これは私の場合の感じ方です。人によって経過は違うでしょうし、気になることは専門家に相談するのがいちばんだと思っています。\n\n## 1度目と違った、2度目の私\n\n責める声に飲まれながらも、2度目の私には、1度目と決定的に違う点がありました。\n\n**どこに相談すればいいか、知っていたんです。**\n\n1度目は「これは何なんだろう」と検索の海で溺れる時間が長かった。でも2度目は、かかりつけの婦人科があって、「また調子が戻ってきたので」と電話できました。1度目に費やした「怖くて動けない時間」が、2度目はほとんどありませんでした。\n\nつまり、1度目の経験は無駄になっていませんでした。学びは「二度と不調が来ない」という形ではなく、**「来たときに動ける」という形**で残っていたんです。\n\n## 自分を責める代わりに、やったこと\n\n自分を責めても、体調はよくなりませんでした。むしろ、責める気持ちが睡眠や気分にまで影を落としていた気がします。\n\nだから私は、責める代わりに、記録をつけることにしました。どんな日に調子が重くなるか、どんな日は楽か。カレンダーに小さく印をつけるだけです。\n\nすると、**自分を責める材料だと思っていた「波」が、ただの観察対象に変わっていきました。** 「また来た、私はダメだ」ではなく、「なるほど、こういう時期に来やすいのか」と。その記録は、婦人科で相談するときの手がかりにもなりました。\n\n不思議なもので、責めることに使っていたエネルギーを観察に向けると、気持ちがずいぶん静かになりました。自分を裁く視点から、自分を眺める視点へ。ほんの少しの切り替えでしたが、私の場合はそれで楽になりました。\n\n## ひとりで抱えないことにした\n\n1度目のとき、私は不調をほとんどひとりで抱えていました。\n\n2度目は、そこも変えてみました。夫に「また少し調子が戻ってきた時期みたい」と早めに伝えたんです。以前なら「心配をかけたくない」と黙っていた場面でした。でも、隠して無理をするより、先に共有しておくほうが、結果的に家の中がぎくしゃくしませんでした。\n\n**波が来ること自体は止められなくても、その波をひとりで受け止めるか、誰かと一緒に見るかは選べる。** 私の場合は、そう気づけたことが、2度目の大きな収穫でした。もちろん誰に何をどこまで話すかは、人それぞれでいいと思います。\n\n## 波は、あなたの努力不足のサインじゃない\n\n最後に、これだけ書かせてください。\n\n2度目の波が来たからといって、あなたの1度目の頑張りが無駄だったわけではありません。私も申し訳なさや情けなさを感じましたが、今は「波があるのが自然なのかもしれない」と思えるようになってきました。\n\n責める時間は、あとでいくらでも取れます。今は、自分を裁くことより、からだの声を記録して、必要なら相談することのほうが、ずっと役に立つと私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"23","title":"「更年期外来行ってくる」を夫に言えるようになった日","category":"パートナー・家族","isHub":false,"wordCount":1926,"body":"以前の私は、更年期外来に行く日、夫にちゃんと言えませんでした。\n\n「ちょっと病院に寄ってくる」「用事があって」。嘘というより、本当のことをはっきり言わない、という感じです。通院はやましいことじゃないのに、なぜか「更年期外来」という言葉が、口から出てきませんでした。\n\n今日は、「更年期外来行ってくる」を普通に言えるようになるまでの話です。\n\n## 言えなかった理由\n\nなんで言えなかったんだろう、と考えると、理由はいくつかありました。\n\n**心配をかけたくなかった。** 「更年期」と聞いた夫が、何か深刻に受け止めるんじゃないかと思っていました。説明するのも大変そうで、だったら言わないほうが楽だと。\n\n**歳を取ったと思われたくなかった。** これは自分でも意外だったのですが、「更年期」という言葉に、どこか「もう若くない」というニュアンスを勝手に感じていました。それを自分から口にするのが、なんだか怖かったんです。\n\n**単純に、恥ずかしかった。** 長年連れ添った相手でも、からだのこまかい変化を話すのは、私の中で「言わない話題」に分類されていました。誰に決められたわけでもないのに。\n\n## 初めて言った日\n\n転機は、通院が定期的になったことでした。\n\n相談が続いて、更年期外来が「一度きり」ではなく「定期的に通う場所」になると、毎回予定をごまかすのが現実的に難しくなったんです。\n\nそれである日、思い切って言いました。「明日、更年期外来行ってくる。前から気になってたこと、相談してるんだ」\n\n言った瞬間、心臓はけっこう鳴っていました。で、夫の反応はというと。\n\n「そうなんだ。何時ごろ帰る?」\n\n……それだけでした。あんなに悩んだのに、拍子抜けするほど普通の返事でした。重い受け止めシーンも、気まずい沈黙もなし。ただの予定の共有として、会話は流れていきました。もちろん、これは私の場合の反応です。人によって違うと思います。\n\n## 言えるようになって、変わったこと\n\nその日を境に、少しずつ変わったことがあります。\n\n体調の話が、日常会話に混ざるようになりました。「今週はしんどい週だから、外食は来週にしたいな」が言えるようになった。以前は調子が悪くても「なんでもない」とごまかして、無理して予定をこなしていたので、これは本当に大きな変化でした。\n\n**体調を偽らなくていい相手が家にいる、というのは、思っていた以上に楽です。**\n\n## 夫の側の本音\n\nあとになって、夫に聞いたことがあります。「前から、なんとなく気づいてた?」と。\n\n夫の答えはこうでした。「体調が悪そうな日があるのは分かってたけど、**どう聞いていいのか分からなかった**」\n\nこれは発見でした。私が「言えない」と思っていた間、夫は「聞けない」と思っていたんです。更年期やからだの話題は、パートナー側にとっても入口がない。踏み込んだら失礼なのか、心配したら大げさなのか、分からないまま黙っていた、と。\n\nお互いが相手への配慮のつもりで黙っていて、結果、何も共有されない。私たちの場合は、そういうすれ違いでした。だから、どちらかが最初の一言を出せば、案外あっさりほどける結び目だったんです。\n\n長く一緒にいるからこそ、かえって言い出しにくいこともあるんだな、と思いました。今さらあらたまって話すのが気恥ずかしい、という感覚もあったのかもしれません。\n\n## 言葉にすることで、私自身も楽になった\n\n意外だったのは、夫に伝えることで、私自身の気持ちも整理されたことでした。\n\n「更年期外来に行っている」と口に出すと、それまでぼんやり抱えていた不安に、輪郭がつくような感覚がありました。頭の中でぐるぐるしていたものが、言葉になったことで、少しだけ扱いやすくなったんです。\n\n**隠すというのは、相手だけでなく自分にも「これは言えないことだ」と言い聞かせ続けること**なのかもしれません。言えるようになってからは、その小さな緊張がなくなって、家にいる時間が前より楽になりました。私の場合は、そう感じています。\n\n## 全部話す必要は、ない\n\n念のため書いておくと、これは「パートナーにからだのことを全部話そう」という話ではありません。\n\n何をどこまで話すかは、あなたが決めていいことです。話したくないことは話さなくていいし、関係性によっては言わない選択が合っていることもあると思います。\n\nただ、もし「本当は言えたら楽なのに」と思いながら隠しているなら。最初の一言は、想像の10分の1くらいの軽さで着地するかもしれません。少なくとも私の場合は、そうでした。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"24","title":"更年期との付き合い方、家族で話し合ってみた日のこと","category":"パートナー・家族","isHub":false,"wordCount":1948,"body":"夫に「更年期外来に通っている」と話せるようになったあと、私はもうひとつ、ずっと先延ばしにしていたことがありました。\n\n**家族みんなで、私のからだのことを話す**という時間です。\n\nきっかけは、私のふとした一言でした。「私、最近しんどい日があるんだけど、みんなにちゃんと言えてなかったな」。考えてみれば、夫には少しずつ話せていても、子どもには何も伝えていませんでした。\n\n## それまでの家の中\n\n話し合う前の我が家は、こういう感じでした。\n\n私が無理をして、家族はなんとなく気づいて、でも触れない。私が不機嫌に見える日があっても、理由は共有されていない。家族はたぶん「今日は機嫌が悪いのかな」くらいに受け取っていたと思います。\n\n**からだの不調が、まるで気分の問題みたいに伝わっていた**んです。これは、私にとっても家族にとっても、もったいないすれ違いでした。\n\n## 話し合った日\n\n特別なことをしたわけではありません。夕食のあと、テーブルにみんながいるタイミングで、私から切り出しました。\n\n「最近、体調に波がある時期でね。しんどそうに見える日があっても、みんなのせいじゃないんだ。ちょっと聞いてほしくて」\n\nうまく話せたわけではありません。言葉に詰まったし、途中で「こんな話、重いかな」と不安にもなりました。でも、家族はそれぞれの受け止め方で聞いてくれました。夫は「無理しなくていいよ」と言い、子どもは少し驚いた様子で「そうだったんだ」と。\n\n診断的な細かい話はしませんでした。私が伝えたのは、あくまで**「私の場合、今こういう時期にいる」という気持ちと状況**だけです。\n\n正直、話し始めるまでは「わざわざ家族に言うことかな」という迷いもありました。大げさに受け取られたらどうしよう、とも思いました。でも、言葉にしてみると、自分が思っていたより自然に受け止めてもらえて、身構えていたのは私のほうだったんだと気づきました。\n\n## 伝えてよかったと思ったこと\n\n話したあと、家の中の空気が少し変わりました。\n\nしんどそうな日に、家族が「今日は無理しないで」と声をかけてくれるようになりました。私が横になっていても、以前のような申し訳なさが減りました。理由が共有されているだけで、こんなに気持ちが軽くなるのか、と思いました。\n\n**「察してもらう」を待つのをやめて、「言葉にして伝える」に切り替えたこと**が、私の場合はよかったんだと思います。\n\n## 子どもに伝えるとき、気をつけたこと\n\n子どもに話すときは、少しだけ考えました。\n\n不安にさせたくなかったので、「お母さんは病気で大変」という伝え方はしませんでした。「歳を重ねると、からだに波が出る時期があるみたい。今のお母さんはそういう時期なんだ」と、できるだけ落ち着いたトーンで話しました。\n\n私も最初は「子どもに心配をかけて申し訳ない」と感じました。でも今は、伝えてよかったと思っています。隠していたほうが、かえって子どもを不安にさせていたかもしれない、と。もちろん、何をどこまで伝えるかは、家庭ごとに違っていいと思います。\n\n子どもは私が思っていたよりずっと落ち着いて受け止めてくれて、その姿に私のほうが少し救われました。守るべき存在だと思っていた相手に、逆に支えられることもあるんだ、と感じた出来事でした。\n\n## 一度で終わりにしなかった\n\n大事だったのは、一度話して終わりにしなかったことです。\n\n最初の話し合いで、家族のすべてが伝わったわけではありません。あとから「あのとき、もっとこう言えばよかった」と思うこともありました。だから、その後も折に触れて、短くでも近況を話すようにしています。\n\n**「ちゃんと説明する日」を一回だけ設けるより、日常の会話に少しずつ混ぜていくほうが、私の家には合っていた**ようです。かしこまった場をつくると、私も家族も身構えてしまう。夕食のついでや、洗い物をしながらのほうが、自然に話せました。人によって、家によって、やりやすい形は違うと思います。\n\n## 話し合う時間そのものが、支えになった\n\n振り返って思うのは、あの日得たものは「理解」だけじゃなかった、ということです。\n\n同じテーブルで、私の話を家族が聞いてくれた時間。あれは体調の説明であると同時に、**「この家では、からだのことを話していいんだ」という確認作業**でした。\n\n家族の関係に正解がひとつあるとは思いません。うまく話せない日もあるし、今も迷うことはあります。それでも、抱え込んでいたものを一度言葉にできたことは、私にとって小さくない一歩でした。同じように、家族にどう伝えようか迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"25","title":"若い頃には想像もしなかった、更年期の医療費のこと。お金で考えた夜","category":"お金・費用","isHub":false,"wordCount":1943,"body":"からだの不調と向き合い始めて、通院が生活の一部になってきた頃。\n\n私の前に、若い頃にはまったく想像していなかったハードルが現れました。\n\n**継続的にかかる、お金です。**\n\n一度きりの受診なら、そこまで身構えませんでした。でも、相談が続き、通院が定期的になると、話は変わってきます。今日は、その費用の前で少し立ち止まった私の記録です。最初にお断りしておくと、費用は医療機関や内容によって変わるようなので、具体的な金額は必ず受診先に確認してください。\n\n## 「これがずっと続くのか」と思った夜\n\nある夜、通院にかかったお金を家計簿にまとめていて、ふと手が止まりました。\n\n一回あたりは、決して払えない額ではありません。でも、これが数ヶ月、あるいはもっと続くのかもしれないと考えたとき、**「一回の出費」と「継続する出費」はまったく別物だ**と気づいたんです。\n\n頭の中で、来月、再来月の家計を並べてみました。子どもにかかるお金、住まいのこと、この先のこと。そこに自分の通院費が加わる。当たり前のことなのに、そのとき初めて現実味を持って迫ってきました。\n\n若い頃は、こういう「自分のからだにかかり続けるお金」を、まったく想像していませんでした。健康は当たり前にあるもので、お金をかける対象だと思っていなかったんです。年齢を重ねるというのは、こういうことも含むのかと、少し不思議な気持ちにもなりました。\n\n## 「私のことは後回しでいいかな」という思考\n\nそして、いちばん良くない考えが浮かびました。\n\n「……私の通院は、少し減らそうかな」\n\n家族のためのお金は削りたくない。だったら自分のところを削ればいい、と。今思えば、あれは危ない考え方でした。**自分のからだを、家計の調整弁みたいに扱おうとしていた**んです。\n\n不調と向き合うと決めたはずなのに、お金の話になると、いちばん最初に自分を後回しにしようとする。長年しみついた癖のようなものだと思います。\n\n## 私がやったこと\n\n結局、私がやったのは2つでした。\n\n**総額の見通しを、受診先で聞いた。** 「これから続けるとして、どのくらいのペースで、どのくらいかかりそうですか」と、思い切って相談してみました。ざっくりでも見通しが立つと、「未知の出費」が「準備できる出費」に変わりました。金額そのものより、先が見えないことのほうが不安だったんだと気づきました。\n\n**夫に、家計の中で共有した。** 通院費のことを、家計の話としてテーブルに乗せました。私たちの場合は、「これは家族全体で考える支出だよね」という話に落ち着きました。ひとりで抱え込んで削ろうとしていたものを、二人で見られるようになったのは大きかったです。\n\n## お金の不安が大きい人へ\n\nここからは、当時の私よりさらに悩んでいる人に向けて書きます。\n\nもし費用の負担が重くて通院をためらっているなら、諦める前に、受診先で正直に相談してみてほしいんです。私が調べたり見聞きした範囲では、費用の相談に応じてもらえる場合もあるようです。確実な約束はできませんが、聞いてみるだけならお金はかかりません。\n\nまた、自治体などが、からだや暮らしの相談窓口を設けている場合もあります。「お金の面が不安で」というのは、あなたが思っているより、相談していい事情だと私は思っています。\n\n## 「自分への出費」の受け止め方が変わった\n\nこのお金の一件で、私の中の考え方が少し変わりました。\n\n以前の私は、自分のからだにかけるお金を、どこかで「贅沢」や「後回しでいいもの」と感じていました。家族のためなら迷わず出せるのに、自分のこととなると急に財布のひもが固くなる。長年の癖でした。\n\nでも、通院を続ける中で思ったんです。**自分の体調が整うことは、めぐりめぐって家族のためにもなっている**、と。私が無理をして倒れるより、少しお金をかけてでも調子を保てるほうが、家全体にとって良いこともある。そう考えられるようになってから、自分への出費への罪悪感が、前より軽くなりました。もちろん、家計には限りがあります。だからこそ、隠さず家族と話せてよかったと思っています。\n\n## 後回しにしていた自分へ\n\n家計簿の前で固まっていた私に言いたいのは、これだけです。\n\nその出費は、たしかに家計にとって小さくない。でも、あなたのからだは、真っ先に削っていい項目ではない。まずは見通しを聞いて、家族と分け合って、それから考えても遅くない。\n\n自分のからだを後回しにしない、というのは、こういう地味なお金の判断の中にもあるんだと、私はこの一件で思いました。同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"26","title":"更年期外来の初診、いくらかかった？行く前に知りたかったお金の話","category":"お金・費用","isHub":false,"wordCount":1919,"body":"更年期外来に行こうか迷っていた頃、私の不安リストの上位にずっと居座っていたのが「お金」でした。\n\nいくらかかるのか、まったく見当がつかない。保険はきくのか。「検査しましょう」と言われて、気づいたら想定外の金額になっていたらどうしよう。家計のやりくりを一手に引き受けている身としては、金額の読めない出費がいちばん怖い。\n\n今日はそんな、更年期外来とお金の話です。最初にお断りしておくと、費用は受診する内容やクリニックによって変わります。これは私の場合の記録なので、正確な金額は必ず受診先に確認してください。\n\n## 行く前の私の想像は「青天井」だった\n\n行く前の私にとって、更年期外来の会計は上限のない世界でした。\n\n相場を知らないと、不安には天井がなくなります。5千円かもしれないし、3万円かもしれない。わからないから、財布にいくら入れていけばいいのかもわからない。教育費や住宅ローンの引き落とし日を頭の中で数えながら、「今月は余裕がないから、また来月にしよう」と受診自体を先延ばしにする。\n\n家族の医療費なら、いくらかかっても「必要な出費」として迷わず出せるのに。子どもの歯科矯正や、家族の急な通院には財布のひもをゆるめられるのに、自分のからだのことになると、途端に金額が気になってブレーキがかかる。そういう順番になっている自分に、あとから気づきました。\n\nいま思えば、**金額そのものより「いくらかわからない」という状態が、いちばんのハードルでした。**\n\n## 私の場合の実際\n\n私の初診は、ほてりと不眠、それに気分の落ち込みの相談が中心でした。\n\n結果から言うと、私の場合は数千円程度で収まりました。「え、そのくらいなの?」というのが正直な感想でした。何万円もの出費を覚悟して身構えていたので、拍子抜けしたくらいです。\n\nもちろんこれは、私のケースです。血液検査などが入るかどうか、相談内容がどうかで変わりますし、同じ相談でもクリニックによって違うと思います。ここで伝えたいのは金額そのものではなく、「未知の恐怖で膨らませていた額と、現実には差があった」という体験のほうです。\n\nあとで思ったのは、あの何年もの先延ばしのあいだ、私はゼロ円で不安だけを買い続けていた、ということでした。数千円で終わる相談を、何万円もの想像で怖がって、その怖がっている時間にはずっと不調を抱えていた。お金の計算としても、あまり得ではなかったのです。\n\n## 保険がきく場合と、きかない場合があるらしい\n\n調べたり受診したりする中で知ったのは、更年期の相談にかかる費用には大きく2種類あるらしい、ということでした。\n\n症状があって診てもらう場合は保険診療になることが多く、一方で、目的によっては自費（自由診療）になるものもあるようです。同じ「更年期外来に行く」でも、内容によって会計の仕組みが違う。\n\nこのあたりの線引きは私が正確に説明できる領域ではないので、断定はしません。実用的な結論だけ言うと、**「今日の内容は保険がききますか?」と会計前に聞いていい**、ということです。私は聞くようになってから、会計の不安がすっかりなくなりました。\n\n## 私がやっている、お金まわりの小さな工夫\n\n- **予約の電話で聞いておく**：「初診で、更年期の相談なんですが、だいたいいくらくらいかかりますか」。目安で構わないので聞いておくと、当日の心の準備がまるで違います。教えてもらえなかったことは、私は一度もありません\n- **現金を多めに持っていく**：カード対応していないクリニックもあったので、念のため\n- **領収書を取っておく**：あとで見返せますし、家計簿に「自分のからだのための出費」としてちゃんと残せます\n\nどれも小さなことですが、「お金の不透明さ」を潰すと、受診のハードルは確実に下がりました。\n\n## 家計の心配で、自分を後回しにしないで\n\n更年期外来に行けない理由が「なんとなく怖い」ではなく「お金がわからない」なら、その不安は電話一本でかなり解消できます。\n\n金額を聞くのは、恥ずかしいことでも失礼なことでもありません。むしろ、ちゃんと準備してくる患者さんです。家族のための出費には迷わないのに、自分のからだの数千円は先延ばしにする——かつての私がまさにそうでした。でも、自分にかけるそのお金は、めぐりめぐって家族のためにもなる出費だと、今は思っています。\n\n同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。診療内容・費用・保険の適用はクリニックや相談内容によって異なります。正確な費用は受診先に直接確認してください。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"27","title":"内診が怖かった私が、婦人科で伝えた一言","category":"婦人科・検診","isHub":false,"wordCount":1910,"body":"婦人科をずいぶん長いあいだ避けてきた理由を、正直に言います。\n\n内診が怖かったからです。\n\n更年期らしき不調が続いて、「婦人科に行けば」と頭では分かっていました。若い頃に一度受けたきりで、あの独特の緊張感だけが記憶に残っている。予約の手前でいつも、内診台のイメージが浮かんで手が止まる。同じ人、きっと多いと思います。\n\n今日は、その怖さとどう付き合ったかの話です。\n\n## 私の「怖い」を分解してみた\n\n私の「内診が怖い」を分解すると、こうなりました。\n\n- **痛そう**。経験者の「痛かった」という話ばかりが目に入っていた\n- **無防備になるのが怖い**。あの体勢で、何をされているか自分からは見えない\n- **久しぶりすぎて勝手が分からない**。前に受けたのがずいぶん前で、記憶があいまい\n- **声を出していいのか分からない**。痛くても「我慢するのがマナー」な気がしていた\n\n書き出してみると、共通点がありました。ぜんぶ「分からない」が土台にあるんです。分からないから、想像が最悪の方向に育っていく。\n\nしかも厄介なのは、この年齢になると「怖い」の上に「今さら」が乗ってくることでした。もういい大人なのに、子どももいるのに、内診くらいで怖がっているなんて。そう思うと、怖さを口に出すこと自体が、また一段ハードルの高いものになっていました。\n\n## 私が診察室で伝えた一言\n\n初めての受診の日、診察室に入った私は、思い切って最初に言いました。\n\n**「内診が怖いんです。久しぶりで」**\n\nいい大人が、と自分でも思いました。語尾は情けないくらい震えていました。でも、この一言が、あの日の私のファインプレーでした。\n\n## 伝えたあとに、変わったこと\n\n先生の対応が、目に見えて変わったからです。\n\nまず、今日の診察で何をするのか、内診が必要かどうかを、先に説明してもらえました。私の場合、その日は問診と血液検査の説明が中心で、**そもそも内診は必須ではありませんでした**。あんなに怯えていたのに。\n\nそして「もし内診をする場合も、声をかけながら進めますね」「痛かったら我慢せず言ってくださいね」と言ってもらえました。「我慢するのがマナー」だと思い込んでいた私には、これが衝撃でした。痛いと言っていい場所だったんです。\n\n怖さの土台が「分からない」だったので、説明してもらえた時点で、怖さは半分以下になっていました。\n\nそれに、先生は「久しぶりの方、多いですよ」とさらっと言ってくれました。私が勝手に背負っていた「今さら」は、診察室ではまったく特別なことではなかったんです。何年ぶりでも、何十年ぶりでも、来た人がいちばんえらい。そんなふうに扱ってもらえた気がして、肩の力が抜けました。\n\n## 「怖い」は、正当な診察情報だった\n\nこの経験で学んだことがあります。\n\n「怖いです」と伝えるのは、わがままでも迷惑でもなく、**医療者にとって必要な情報**だということです。\n\n緊張しているかどうかで、診察の進め方は変わるようです。黙って我慢されるより、怖いと言ってもらったほうが、向こうも対応しやすい。つまり「怖い」の申告は、診察の質を上げる協力なんです。\n\n年齢を重ねると、なんとなく「今さら怖いなんて言えない」という気持ちも出てきます。まわりに気を遣う癖が、こういうところにも顔を出す。でも診察室でまで気を遣って、痛みや怖さを飲み込む必要はありませんでした。我慢は、誰のためにもなっていなかったんです。\n\n## まだ行けずにいる人へ\n\n内診が怖くて婦人科に行けずにいる人に、私から3つだけ。\n\n1. **怖いと伝えていい。** 診察室でも、なんなら予約の電話の段階で「内診が怖いのですが」と言ってもいい。対応を考えてもらえます\n2. **内診が毎回あるとは限らない。** 私の初回は問診と説明が中心でした。相談内容によるようです\n3. **「怖いから行かない」の先延ばしがいちばん、からだに優しくない。** 怖がりのまま行っていいんです。この歳になった私も、怖がりのまま行きました。堂々としている必要はありませんでした\n\nからだのことをずっと後回しにしてきた人ほど、この一歩が重いのはよく分かります。私も、家族の予定や仕事を優先しているうちに、自分の予約だけがいつも後ろに回っていました。でも、一度「怖いです」と言えてしまえば、次からはずっと楽になります。\n\nあなたの「怖い」が、受付で言えるくらいの大きさになりますように。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。診察の内容や進め方は、相談内容やクリニックによって異なります。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"28","title":"生理不順を「そのうち来るし」で放置していた私が、婦人科に行った理由","category":"婦人科・検診","isHub":false,"wordCount":1938,"body":"「あれ、今月まだ来てないな」\n\nそう気づいてから、私はいつも同じ言葉で片付けていました。「まあ、そのうち来るし」。\n\n若い頃と違って、この年齢になると周期が乱れても「歳のせいかな」でさらに流しやすくなります。数日遅れか、数週間遅れかはわかりませんが、たいてい来る。だから毎回「ほら来た」で終わって、次の月もまた「そのうち来るし」。そのループを、私は長いこと続けていました。\n\n今日は、そのループを抜けた話です。\n\n## 放置していた理由\n\n私が不調を放置するときのパターンは、だいたい決まっています。生理不順の場合はこうでした。\n\n**痛くなかったから。** 周期の乱れそのものには、その瞬間の苦痛がありません。痛みのない不調は、後回しリストの最下位に沈みます。\n\n**忙しかったから。** 仕事と家のことに追われて、「落ち着いたら考えよう」と思っているうちに、次の生理が来て、リセットされる。40代の毎日に「落ち着いたら」は、なかなか来ませんでした。\n\n**「歳のせい」で説明がついてしまったから。** 若い頃なら「おかしいな」と思ったであろう乱れも、この年齢だと「更年期の入り口かな」で自己完結してしまう。基準がないと、すべてが「様子見でいい」に分類されます。\n\n## 記録が突きつけてきた事実\n\n例によって、転機は記録でした。\n\n体調管理アプリを使い始めてしばらく経った頃、ふと周期の一覧を眺めたんです。そこには、自分の記憶よりずっとバラバラな数字が並んでいました。\n\n記憶の中の私の生理は「たまに遅れる」程度でした。記録の中の私の生理は、そうではなかった。**人間の記憶は「まあ大丈夫」の方向に加工するらしい**と、自分のデータで思い知りました。\n\nそして記録は、もうひとつのことも教えてくれました。「歳のせい」で片付けていた乱れが、いつからどう変わってきたのか。ぼんやりした印象ではなく、日付のついた事実として並んでいる。これを持って相談に行けば、先生に伝えられることが全然違う。そう思えたのも、記録があったからでした。\n\n## 私を動かしたのは、症状ではなく「不安の常駐」だった\n\nそれでも、痛みがないので緊急性は感じていませんでした。私を最終的に婦人科に向かわせたのは、症状ではなく、気分のほうでした。\n\n生理が乱れている期間、頭の片隅に、常に小さな不安が住んでいるんです。「更年期だから当たり前?」「それとも、なにか別のこと?」。検索しては閉じ、閉じては検索する、おなじみのあれです。\n\nあるとき気づきました。この不安、毎月ずっと払い続けてる。だったら一度ちゃんと診てもらって、この常駐アプリを終了させたほうが、精神的なコスパがいいんじゃないか?\n\nしかも40代のこの時期は、更年期の入り口かもしれないという別の不安も重なります。「更年期だから当然」と思いたい気持ちと、「本当にそれだけ?」という気持ちが、頭の中で毎月せめぎ合う。この綱引きに疲れたのも、私が予約ボタンを押した理由のひとつでした。受診の理由なんて、それでいいと思ったんです。\n\n## 行ってみて\n\n診察で言われた内容の詳細は、個人差の大きい話なので書きません。書けるのは、行ってよかったという結論と、その理由です。\n\nいちばん大きかったのは、**「どのくらいの乱れなら様子見でいいか」の線を、私の場合に合わせて教えてもらえた**ことです。\n\nこれまで私は、基準がないまま「歳のせい」で「大丈夫」を繰り返していました。今は、「ここまでは気にしなくていい、こうなったら来てください」という線を持っています。頭の片隅の常駐アプリは、この線をもらった日に、ようやく終了しました。\n\n面白いもので、線を一本もらっただけで、日々の気持ちがずいぶん軽くなりました。「歳のせい」で流していた頃は、流しているようで実は毎回ひっかかっていた。線があると、ひっかからずに通り過ぎられる日が増えたのです。\n\n## 「生活への影響」には、不安も含まれる\n\n不調を相談するかどうかを、私は「我慢できるか」ではなく「生活に影響しているか」で考えるようにしています。\n\n生理不順で学んだのは、その「影響」には、**痛みだけでなく不安も含まれる**ということです。毎月何日も「大丈夫かな」を抱えて過ごしているなら、それはもう立派な生活への影響。痛くなくても、相談する理由として十分でした。\n\n「そのうち来るし」「歳のせいだし」と今月も唱えている人へ。その言葉、私は数年分唱えました。唱えた時間で解決したことは、ひとつもなかったです。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。生理周期の乱れの原因や受診の目安は人によって異なります。気になる場合は自己判断せず、医師など専門家に相談してください。"},{"num":"29","title":"デリケートゾーンのこと、誰にも聞けなかった。私が相談できるようになるまで","category":"セルフケア・理念","isHub":false,"wordCount":1915,"body":"このnoteでいろいろな「言えなかったこと」を書いてきましたが、今日の話題は、その中でも最上級です。\n\nデリケートゾーンのこと。\n\nかつての私は、この話題を友達にも、母にも、検索窓にすら、まともに出せませんでした。検索履歴に残るのすら嫌で、調べては履歴を消していたくらいです。この歳になって今さら、という気持ちも、恥ずかしさに拍車をかけていました。\n\n今日は、この「いちばん聞けない話題」を相談できるようになるまでの話です。ケアの具体的な方法の話ではないので、その点は先にお断りしておきます。\n\n## 聞けなかった理由\n\n生理の話は、女友達となら少しはできました。婦人科に通うことも、このnoteを始めた頃には言えるようになっていました。\n\nでもデリケートゾーンの話題だけは、別格でした。\n\n**話題にすること自体が、はしたない気がしていた。** 誰に言われたわけでもないのに、この部位の話は「口にしてはいけないこと」に分類されていました。悩みがあっても、悩みがあること自体を隠す。二重の蓋です。\n\n**聞ける相手の想像がつかなかった。** 友達に聞くのは恥ずかしい。母には余計に言えない。同世代のママ友にも、なんとなく切り出せない。じゃあ誰に? の答えが、私の人生に存在しませんでした。\n\n**年齢による変化なのか、判断できなかった。** 閉経の前後で、からだにはいろいろな変化が出るようです。でもそれが自然なことなのか、相談したほうがいいことなのか、私には見分けがつきませんでした。基準がないから、「歳だから仕方ない」で片付けてしまう。\n\n結果、どうなるか。**いちばん聞きにくい話題は、いちばん放置される。** 私の場合、小さな違和感を、何年も「なかったこと」にしていました。\n\n## 転機は、かかりつけができたこと\n\n転機は、劇的な何かではありませんでした。\n\n更年期の相談で婦人科に定期的に通うようになって、先生と顔なじみになってきた頃。ある日の診察の終わりに、「あの、ついでに聞いてもいいですか」と切り出せたんです。\n\nポイントは「ついで」です。デリケートゾーンの相談のためだけに予約を取るのは、当時の私にはハードルが高すぎました。でも、別の用事のついでなら、言えた。**かかりつけがあるということは、「ついで」が使えるということ**なんだと、このとき知りました。\n\n## 聞いてみたら\n\n相談の中身とその答えをここに書くことはしません。ケアや変化は人によって違うようですし、私の又聞き情報より、専門家に直接聞いてほしいからです。\n\nただ、ひとつだけ書かせてください。私が自己流でやっていたこと、良かれと思ってやっていたことの中に、見直したほうがいいものがありました。**「誰にも聞けないから自己流」は、けっこう危ういルートだった**んです。\n\n先生は、まったく嫌な顔をしませんでした。考えてみれば当たり前で、婦人科にとってこの部位はど真ん中の専門領域です。しかも、年齢に伴う変化の相談は珍しくないようでした。私が「はしたない話題」だと思い込んでいたものは、診察室では単なる健康の話題でした。\n\nあとで知ったのですが、こうした変化は同世代の多くが経験するものらしく、相談に来る人も少なくないそうです。私はてっきり、自分だけがこっそり抱えている恥ずかしい悩みだと思い込んでいました。「口にしてはいけないこと」だと自分で決めていただけで、実際には、名前をつけて相談していい、ありふれた話題だったのです。\n\n## 「聞いていい話題」に変わった日\n\n一度聞けてしまうと、この話題は私の中で「聞いていい話題」に分類が変わりました。\n\n恥ずかしさが消えたわけではありません。今でも切り出すときは少しもぞもぞします。でも、「恥ずかしいから放置する」から「恥ずかしいけど聞く」に、優先順位が入れ替わりました。\n\nからだの一部について、この先ずっと誰にも相談できないままでいるのと、もぞもぞしながらでも聞ける場所があるのと。どちらが自分を大事にしているかは、比べるまでもありませんでした。\n\n## 同じように黙っている人へ\n\nもし今、誰にも言えない小さな違和感や疑問を抱えている人がいたら。\n\nそれを聞くための専門の場所が、ちゃんとあります。あなたが「はしたない」「もう歳だから」と思っているその話題は、診察室ではただの健康の話です。そして「ついで」に聞くのは、ずるくもなんともない、立派な相談の技術です。\n\nひとりで抱え込まなくていいと、私は思っています。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。デリケートゾーンのケアや気になる症状については、自己判断せず、医師など専門家に相談してください。"},{"num":"30","title":"「病院に行くほどじゃない悩み」はどこに相談する？私の相談先マップ完全版","category":"相談先・オンライン診療","isHub":true,"wordCount":2081,"body":"このnoteを書き始めてから、私がいちばん繰り返し書いてきたテーマは、たぶんこれです。\n\n**「この悩み、どこに相談すればいいんだろう」**\n\nほてりのとき、不眠のとき、生理不順のとき、デリケートゾーンのとき。毎回形を変えて、同じ壁にぶつかってきました。今日はその総まとめとして、私の「相談先マップ」の完全版を書きます。\n\n## 「病院に行くほどじゃない」の正体\n\nまず、この言葉の話をさせてください。私たちが悩みを放置するときの決まり文句、「病院に行くほどじゃないから」。そして40代になると、もうひとつの魔法の言葉が加わります。「歳のせいだから」。\n\nいろいろな不調で散々この2つを使ってきた私の結論は、こうです。**どちらの言葉の正体も、症状の軽さではなく「基準を知らないこと」でした。**\n\nどのくらいなら相談していいのか、誰も教えてくれない。だから、ほてりも、気分の落ち込みも、周期の乱れも、デリケートゾーンの違和感も、ぜんぶ「行くほどじゃない」「歳のせい」の箱に入る。箱は無限に入ります。そして箱の中身は、勝手には解決しません。\n\n## 私の相談先マップ\n\nそこで、私が今使っている相談先の一覧です。用途別に並べます。どれが上、という順位はありません。\n\n**婦人科・レディースクリニック**\nしっかり診てもらいたいとき。検査が必要かもしれないとき。私の場合はここが「かかりつけ」で、たいていの相談の起点です。「ついで相談」ができるのが、かかりつけの最大の強みでした。\n\n**更年期外来**\nほてり・不眠・気分の落ち込みなど、更年期らしき不調をまとめて相談したいとき。「これって更年期?」という漠然とした不安を、専門的に受け止めてもらえる場所として頼りにしています。\n\n**オンライン診療**\n時間が取れないとき。人目や移動がハードルのとき。仕事や家のことで一日が埋まっていても、スマホから相談できる。「後回しの言い訳が消える」のが実感できた選択肢です。\n\n**パーソナルケアクリニック**\n「病気未満」の相談やケアのとき。生理、デリケートゾーンなど、「これって病院案件?」と迷うような悩みの入口として、行きやすさを重視した選択肢のようです。内容はクリニックによって幅があるので、料金の明示などは事前に確認を。参考として、こういうところがあります → https://personalcareclinic.jp/\n\n※紹介料などは受け取っていません。受診をすすめるものではなく、選択肢のひとつとしての情報です。\n\n**保健所・自治体の窓口**\n検査の相談や、お金・事情があって医療機関に行きづらいときの相談先。公的な窓口は、思っているより頼っていい場所でした。\n\n**薬局の薬剤師さん**\n薬のこと、市販薬で様子を見ていいかの相談。処方薬の疑問も、処方元に聞きづらければここで聞けます。いちばん身近な専門家です。\n\n## 使い分けの実例\n\nこのマップを、私は実際こう使ってきました。\n\nほてりと不眠は、更年期外来へ。生理不順の相談は、かかりつけの婦人科へ。忙しくて時間が取れないときの継続相談はオンライン診療。デリケートゾーンの疑問は、婦人科の「ついで相談」。そして「病院に行くほどかな」と迷う小さな悩みは、行きやすさで選びました。\n\nパターンが見えてきませんか。**大事なのはどこを選ぶかより、「選べる状態」を先に作っておくこと**です。夜中に不安になってゼロから探すのと、マップから選ぶのとでは、動き出しの速さがまったく違います。\n\n40代になってから、私はこのマップに助けられる場面が増えました。仕事も家のこともあって、じっくり調べる時間はなかなか取れません。だからこそ、元気なうちに一度作っておいたマップが効きます。不調が出てから探すのではなく、不調が出たときに開くだけ。その差は、想像以上に大きいものでした。\n\n## どれを選んでも正解、放置だけが不正解\n\nこのマップに優劣はありません。迷ったら婦人科でいい。更年期の不調なら更年期外来でいい。時間がなければオンラインからでいい。お金が不安なら公的窓口からでいい。\n\nどの入口から入っても、必要ならちゃんと次の場所につないでもらえます。医療と相談の世界は、入口を間違えたら弾かれる場所ではありませんでした。\n\n唯一の不正解は、「行くほどじゃない」「歳のせい」の箱に入れて、放置し続けることだけ。あの箱の中身は、勝手には減りません。\n\n## あなたのマップを作ってみてください\n\n私のマップは、あくまで私の生活に合わせたものです。住んでいる場所、生活リズム、悩みの種類によって、あなたのマップは違う形になると思います。\n\n元気なうちに、スマホのメモに数行書いておく。それだけで、いつかの夜のあなたが助かります。\n\nこのnoteが、あなたのマップ作りの材料になれたら、これほどうれしいことはありません。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。相談先の内容・費用・対応範囲は施設や自治体によって異なります。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"31","title":"ホルモン補充療法の費用、1年続けてわかったこと","category":"お金・費用","isHub":false,"wordCount":2097,"body":"更年期のことで婦人科に通い始めた頃の記録は、以前この場所に書きました。\n\nあれからさらに時間が経って、気づけば1年が過ぎていました。通い始めのころは「まずは自分のからだと向き合えるかどうか」で頭がいっぱいだったのですが、1年という区切りを迎えて、新しく気になってきたことがあります。\n\n**このまま続けるとしたら、お金はどうなるんだろう。**\n\n今日は、医師と相談してホルモン補充療法を試すことにした私が、1年続けてみて見えてきた費用の話です。最初にお断りしておくと、これは「効果があります」とか「これくらいで済みます」という保証の記事ではありません。合う・合わないは人によるようですし、金額も医療機関や内容、時期によって変わるようです。私が書くのは、あくまで当時の私の場合の話です。\n\n## 続けるかどうかの分かれ目に、お金の話があった\n\n始める前の私は、費用のことをそこまで真剣に考えていませんでした。\n\n数ヶ月なら、多少かかっても続けられる。そう思っていたんです。でも1年、その先も続けるかもしれないとなると、話は別でした。定期的に通って、そのたびに診察と処方があって、飲み続ける限りどこかでお金が出ていきます。\n\n続けるかどうかを考えるとき、体調の話とはまた別に、**「この負担を、これからも続けられるか」という現実的な問い**が、私の中で無視できないものになっていきました。子どもや住まいにかかるお金と並べて、自分の通院費をどう置くか。40代のいまだからこそ、重く感じた部分でもありました。\n\n## 1年で、実際にどのくらいだったか（私の場合）\n\n私の場合、はじめの数ヶ月は月に一度通って、その都度処方してもらっていました。診察と薬を合わせた1回あたりの負担は、思っていたより抑えられた印象でしたが、これは私が通っていた医療機関での、私の内容での話です。\n\n保険が使えるかどうかも、私は受診先で「私のケースはどういう扱いになりますか」と直接聞いて、はじめて自分の場合を把握できました。**同じ治療でも、内容や医療機関によって金額の幅はけっこうあるようだ**、というのも、このとき知ったことです。\n\nだから、ここに具体的な数字は書きません。私の体感の金額をそのまま書いてしまうと、それが基準みたいに伝わってしまう気がするからです。正確なところは、必ず通っている（あるいは通おうとしている）医療機関で確認してほしいと思っています。\n\n## 通院のペースで、負担の感じ方が変わった\n\nしばらく経ったころ、先生に「様子が落ち着いていれば、まとめて処方することもできますよ」と教えてもらいました。\n\nそれから私は、毎月の通院から、少しペースを空けて処方してもらう形に切り替えました。結果的に、これが負担の感じ方の面でも助かる変化でした。毎回かかっていた診察の分が減ったからです。\n\n薬そのものの負担が大きく変わらなくても、**通院の回数が減っただけで、トータルの支出も、通う手間も落ち着いた**感覚がありました。仕事や家事の合間を縫って通っていた身には、時間の面でも大きかったです。ただ、どのくらいのペースが適切かは体調次第なので、これも自己判断ではなく先生と相談して決めたことです。\n\n## 費用と付き合うために、私がやったこと\n\n1年続ける中で、私なりにお金と付き合うためにやったことがいくつかあります。\n\n- **総額の見通しを受診先で聞く**:「これから続けるとして、どのくらいのペースで、どのくらいかかりそうですか」と、思い切って相談してみたこと\n- **固定費として家計に組み込む**:毎月あるいは数ヶ月ごとに出ていくお金だと最初から決めて、他の生活費と同じ枠で予算を立てたこと\n- **オンライン診療も選択肢として調べておく**:私は基本的に通院を続けていますが、忙しい時期に一度利用しました。通う手間を考えると、私には悪くない選択肢でした\n- **領収書を残しておく**:医療費控除の対象になるかどうかは私の場合は確認しきれていませんが、あとで振り返る記録として残すようにしています\n\nどれも派手な工夫ではありません。ただ、**「知らないまま払う」のと「見通しを立てたうえで払う」のとでは、同じ金額でも心持ちがだいぶ違いました。**\n\n## 続けるか迷っている人へ\n\n1年続けてみて思うのは、費用は我慢して払い続けるものというより、「知って、選んで、付き合っていくもの」だということです。\n\n金額そのものは、私の場合がそのまま誰かに当てはまるとは限りません。医療機関によっても、内容によっても、時期によっても変わるようです。だからこそ、迷っているなら、まずは受診先に率直にお金のことを聞いてみてほしいです。続けられるペースがあるかどうかも、聞いてみる価値があると私は感じています。\n\n続けることそのものが正解というわけではなく、費用も体調も含めて、自分にとって無理のない形を選べたら、それでいいのだと私は思っています。同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"32","title":"「更年期の通院は保険証でバレる？」当時の私が調べたこと","category":"お金・費用","isHub":false,"wordCount":2023,"body":"更年期外来に通うと決めたとき、地味だけれど頭から離れない不安がありました。\n\n**この通院、保険証を使ったら家族に伝わるんじゃないか。**\n\n夫の扶養に入っていて、健康保険は世帯でまとめられている。そういう立場だと、自分ひとりの受診が自分だけの中で完結しない気がして、なかなか一歩が踏み出せませんでした。今日は、当時の私が調べたことを書きます。\n\n## 続けて通うとなって、はじめて出てきた不安\n\n一度きりの受診なら、多少の出費として自分の中で処理できます。でも更年期の不調は、一回行って終わりというものではありませんでした。\n\n同じ婦人科に、何ヶ月も続けて通う。処方も続く。そうなると、**「毎回の記録が、どこかに積み重なっていくんじゃないか」**という、当たり前のことに、通い始めてから気づいたんです。\n\n夫の扶養に入っている私の場合、受診の記録は保険の側にも残るはずです。当時の私は、家族が寝静まったあとに「更年期 通院 保険証 家族 わかる」と検索しては、サイトによって説明が微妙に違うことにモヤモヤしていました。\n\n## 「保険証でバレる」と思った理由\n\n私が特に気になったのは、保険組合などから世帯に届くことがあるという**医療費のお知らせ**でした。\n\n世帯の医療費をまとめて知らせる書類が、年に何回か送られてくる仕組みがあるらしい、と当時の私はネットで知りました。それがもし夫のところにまとめて届いて、そこに婦人科の名前が載っていたら。そう考えると、それだけで受診をためらう気持ちになりました。\n\nもうひとつ気になったのが、**保険が使える受診かどうか**でした。婦人科の先生に聞いたところ、私の場合の症状に対する治療という扱いになる、とのことでした。ただ、これも私のケースの話で、内容によって扱いが変わることがあるらしい、というのも、このとき初めて知りました。\n\n## 調べて、わかったこと・わからなかったこと\n\nいろいろ調べましたが、正直に言うと、はっきり「絶対に伝わらない」と言える答えには行き着きませんでした。\n\n私が調べた範囲では、医療費のお知らせに載るのは受診した医療機関名と金額が中心で、病名や症状までは載らないことが多い、という説明を目にしました。ただ、医療機関の名前に「婦人科」と入っていれば、それだけで何科にかかったかは推測できてしまいます。\n\n載る項目や送付の頻度は、加入している保険組合や制度によって違うようで、**私が一律に説明できることではありませんでした。**だからこそ私は、想像だけで不安を膨らませるより、自分の場合はどうなのかを確認することを選びました。\n\n## 当時、私が実際にやったこと\n\nあくまで私の場合の記録として書きます。\n\n- **保険が使えるかどうか**:通院先の婦人科に、私のケースがどういう扱いになるか、はっきり聞きました\n- **医療費のお知らせの有無**:加入している保険組合に、送付の頻度や記載内容を問い合わせてみました。運用は組合によって違うと言われました\n- **支払い方法**:家計と共有している口座やカードの履歴から気づかれないよう、自分で管理している手段を選びました\n- **対面が緊張するときの窓口**:通うこと自体に構えてしまう時期は、オンライン診療のように相談しやすいと感じる方法も選択肢に入れました\n\nひとつずつ確認していくうちに、「わからないから怖い」状態から、「わかったうえでどうするか選べる」状態に変わっていきました。全部が思い通りの答えだったわけではありませんが、聞く前より聞いたあとのほうが、気持ちは確実に落ち着いていました。\n\n## 制度は変わるし、私の場合が全員に当てはまるわけではない\n\nここまで書いてきたのは、当時の私が調べて、当時の私の状況にあてはめた結果です。健康保険の仕組みや医療費のお知らせのルールは、私が調べた時点でも幅がありましたし、今後変わることも十分あると思います。\n\nだから、同じように不安な人には、私の記録をそのまま当てはめるのではなく、**自分が入っている保険の窓口や、通っている医療機関に直接確認してほしい**と思っています。婦人科の受付で聞いてもいいですし、保険組合に電話してもいい。緊張するなら、まずは電話一本からでも十分だと私は感じています。\n\n## あの頃の私と同じように調べている人へ\n\n保険証のことで足が止まっている人は、きっと少なくないと思います。とくに、自分が世帯の中の「扶養される側」だと、自分のからだのことなのに、自分だけの判断で動けない気がしてしまうんですよね。\n\n「伝わるかもしれない」という不安は、調べても完全にはゼロになりません。それでも、わからないまま我慢するより、ひとつずつ確認していくほうが、気持ちは少し軽くなる気がします。私はそうでした。\n\nひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"33","title":"更年期に気づいてから1年。私が変わったこと、変わらないこと","category":"セルフケア・理念","isHub":false,"wordCount":1984,"body":"最初の記事を書いてから、気づけば1年が経っていました。\n\n自分の不調を「更年期かもしれない」と思い始めたあの頃のことを、私はこのnoteの中で何度も書いてきました。ほてりや眠れない夜、理由もなく落ち込む日を、「疲れかな」「気のせいかな」とやり過ごしていた頃のことです。\n\n当時の記事を読み返すと、あの頃の心細さがそのまま蘇ってきます。**あの頃の私は、自分のからだに起きている変化のことを、本当に何も知りませんでした。**\n\n正直に言うと、「1年」という数字にそこまで大きな意味はないのかもしれません。からだの状態がある日を境にきっぱり変わったわけでもありません。それでも、振り返るのにちょうどいい距離だなと感じたので、今日はここで一度立ち止まってみようと思います。きれいにまとめるつもりはありません。変わったことも、まだ変わっていないことも、両方書いておきます。\n\n## 変わったこと：からだの「相談先」ができた\n\nいちばん大きく変わったのは、ここだと思います。\n\n不調に気づいた頃、私には相談できる場所も人も、正直ひとつも思いつきませんでした。検索結果だけを頼りに、家族が寝たあとの部屋でひとり考えるしかなかったんです。今は違います。かかりつけの婦人科があって、「ちょっと聞いていいですか」で済む関係ができています。\n\n先日も、体調の波が急に強くなったときに、次の受診まで待たずに相談できたことがありました。あの頃の私からすると、これだけでもかなりの進歩です。忙しい時期はオンライン診療も併用していて、通院できない月があっても、からだのことを止めずにいられるようになりました。\n\n**「何かあったら、ここに聞けばいい」という場所があること。それだけで気持ちがこんなに軽くなるとは、あの頃の私は想像もしていませんでした。**\n\n## 変わったこと：医師と相談して、向き合い方を決めた\n\n不調と向き合うと決めたあと、私は婦人科で相談して、自分に合いそうな方法を先生と一緒に考えました。\n\n体調の波が以前より少し扱いやすくなった気はしていますが、これはあくまで私の体感で、合う・合わないは人によって違うようです。実際、始めてすぐは自分に合っているのかもわからず、しばらく様子を見ながら通いました。効果を保証できる立場ではないので、ここは「私はこう選んだ」という話にとどめておきます。\n\n「自分のからだのために、定期的に何かをする」という習慣が生活の中にできたことも、地味だけれど大きな変化でした。家族のことばかり優先してきた私にとって、自分のために時間を取ること自体が、はじめは慣れないことだったんです。\n\n## それでも、変わらないこと\n\nここまで読むと、私はすっかり変われた人みたいに見えるかもしれません。でも、正直に書きます。\n\n婦人科の予約を「今月は忙しいから」と後ろ倒しにしてしまうことは、まだあります。検診の前は、1年経った今でも少し緊張しますし、待合室で名前を呼ばれる瞬間が、いまだにちょっと苦手です。\n\n夫に体調のことを伝えるのも、毎回スムーズにできているわけではありません。今も、言い出せずに飲み込んだ言葉があります。**「もう乗り越えた」とは、正直言えません。**\n\nそれに、仕事や家事の忙しさを理由に「今週はいいか」と自分のからだを後回しにしてしまう週も、普通にあります。このnoteで掲げている「後回しにしない」を、私自身がまだ完璧に実践できていないんです。\n\n## この1年でわかったこと\n\n変わったことと変わらないことを書き出してみて、ひとつ気づいたことがあります。私が本当に手に入れたのは、「完璧なからだ管理」ではなく、**「後回しにしても、戻ってこられる場所」**だったということです。\n\n以前の私は、後回しにした自分を責めて終わっていました。今は、後回しにしたことに気づいた時点で、次の予約を入れたり、体調のメモを見返したりできます。責める代わりに、戻る場所へ戻る。この1年でできるようになったのは、たぶんそれくらいのことです。地味ですが、私にとっては大きな違いでした。\n\n## 読んでくれているあなたへ\n\nこのnoteを読んでくれている人の中には、私と同じように、まだ変化のとまどいの真っただ中にいる人もいるかもしれません。\n\n1年経って言えるのは、「不安がゼロになる日」は、たぶん来ないということです。それでも、相談できる場所を知っていることと、知らないことの間には、大きな差があると私は感じています。\n\n完璧に変わらなくていいと思っています。私も、完全には変われていません。それでも、迷ったときに向かえる場所が増えたことは、私にとって確かな1年分の変化でした。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"34","title":"体調管理アプリを使い始めて、いちばん変わったこと","category":"セルフケア・理念","isHub":false,"wordCount":2116,"body":"「体調管理アプリって、結局カレンダーにメモするのと同じじゃないの？」\n\n使い始める前の私は、正直そう思っていました。自分の体調くらいだいたい把握しているし、わざわざスマホに記録する意味がわからない。まわりで使っている人がいても、「几帳面な人がやることだよね」くらいの感覚でした。\n\nでも今は、もう手放せません。この記事では、まだ体調管理アプリを使ったことがない人に向けて、私が実際に使ってみて感じた変化を書いておきます。\n\n## きっかけは、婦人科での「えっと……」だった\n\n使い始めたきっかけは、婦人科の問診でした。\n\n更年期のことで通うようになってから、受付や問診票で、必ずと言っていいほど聞かれる質問がありました。\n\n「最近の生理はいつでしたか」「調子が悪いのは、どのくらいの頻度ですか」\n\nこれに、私はいつも「えっと……」と固まっていました。手帳をめくったり、記憶をたどったり。年齢とともに周期も乱れてきて、以前のように「だいたいこのあたり」とも言えなくなっていて、正確に答えられたことは、たぶん一度もなかったと思います。\n\n先生に「アプリで記録しておくと、次からご自身でも波が見えて、話しやすくなりますよ」と言われたのが、私が体調管理アプリを使い始めたきっかけでした。半信半疑ではありましたが、毎回問診で固まるくらいなら、と思って入れてみることにしました。\n\n## 最初は、ただの記録アプリだと思っていた\n\n正直に書くと、最初の数ヶ月は惰性でした。\n\n体調が気になった日に開いて、ボタンを押す。それだけ。周期や体調の波を見返す習慣は、なかなかつきませんでした。\n\n**変わったのは、婦人科の問診で「即答」できた日でした。**\n\n「最近の様子は……」といつものように口ごもりかけて、その場でアプリを開いたら、この数ヶ月の記録がひと目で出てきたんです。「この時期に眠れない日が続いて、ここで少し落ち着いて」と、迷いなく話せた瞬間、自分でも驚くくらいホッとしました。\n\nたったそれだけのことなのに、診察室での居心地が全然違いました。うまく説明できない自分に焦らなくていい。それだけで、問診全体の緊張がひとつ減った気がします。\n\n## 「気のせい」が「記録」に変わった\n\nもうひとつ、私にとって大きかったことがあります。\n\nこれまで私は、体調の波を「気のせいかな」「疲れかな」で片付けてきました。でも記録を続けていると、**なんとなく感じていた不調が、目に見える形になっていく**んです。\n\n「この時期はいつも調子を崩しやすい」とわかると、大事な予定を無理に詰め込まないでおこう、と先回りできるようになりました。自分を責める代わりに、「そういう時期だから仕方ない」と受け止められる。記録があるだけで、自分のからだに対する態度が少しやさしくなった気がします。\n\n## 家族に、波を説明しやすくなった\n\n思いがけず助かったのが、家族との会話でした。\n\n以前は、調子が悪い日に夫から「どうしたの」と聞かれても、うまく説明できませんでした。自分でも波がつかめていなかったからです。「なんとなくしんどい」としか言えず、かえって心配や気まずさだけが残ることもありました。\n\n記録をつけるようになってからは、「この時期はいつも落ちやすいみたい」と、具体的に伝えられるようになりました。**気分の問題ではなく、からだの波なんだと家族に共有できた**だけで、家の中の空気が少しやわらいだ気がします。もちろん記録を見せるかどうかは人それぞれですが、私の場合は、自分の言葉で説明できる材料があること自体が支えになりました。\n\n## 続けるコツというほどでもないけれど\n\n続けるコツと言えるほどのものはあまりないのですが、強いて挙げるなら**完璧に記録しようとしない**ことだったと思います。\n\n気分や体温まで毎日細かく入力しようとした時期もあったのですが、それは数日で挫折しました。今は、気になったことだけをひと言メモする。それ以外は気が向いたときだけ。それくらいのゆるさにしてから、逆に続いています。\n\nアプリによって使い勝手や機能はかなり違うようです。私が調べた範囲では、多機能さよりも「自分が続けられる操作の軽さ」を基準に選んでいる人が多い印象でした。仕事や家事の合間に開くものなので、開くハードルの低さのほうが、結局は続けやすさにつながる気がしています。\n\n## まだ使っていない人へ\n\n体調管理アプリを使ったからといって、不調そのものが軽くなるわけではありません。少なくとも私の場合は、そこは変わりませんでした。\n\n変わったのは、**自分のからだの情報に、自分がいちばん詳しくなれたこと**だと思っています。\n\n「えっと……」と固まらなくていい。婦人科でもオンライン診療でも、記憶を頼りにせずに話せる。それだけのことですが、日常の中では地味に効いてくる変化でした。\n\nもしまだ使ったことがなければ、記録は完璧じゃなくて大丈夫です。気になったことをひと言メモするだけから、始めてみてもいいかもしれません。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"35","title":"薬を飲み忘れた日、私がやったこと","category":"セルフケア・理念","isHub":false,"wordCount":2019,"body":"今このページを開いている人は、たぶん「あ、飲んでない」と気づいた直後か、その不安がまだ抜けきらないままだと思います。私も、同じ夜を過ごしたことがあります。\n\n私は更年期のことで婦人科に通い、医師と相談しながら処方された薬を続けています。毎日のことなので、「もう慣れたし大丈夫」と思っていた時期もあったのですが、慣れた頃にこそ抜けるんだな、と思い知った日がありました。\n\nこれは、その日に私がやったことの記録です。**先に書いておくと、この記事には「飲み忘れたらこうすればいい」という具体的な対処法は書きません。** 理由は本文の中で説明します。\n\n## 「あ、飲んでない」と気づいた瞬間\n\nその日は、寝る前にふと気づきました。前日の分が、まだ手つかずで残っていたんです。\n\n一瞬、頭が真っ白になりました。「いつから飲んでいなかったんだろう」「今日はもう飲んでいいのか」「これって大丈夫なのか」。考えが順番も脈絡もなくぐるぐる回って、正直しばらく手が止まっていました。\n\n仕事や家事に追われて、家族のことを優先しているうちに、自分のことがいちばん後回しになっていたんだな、と気づきました。「また後回しにしてしまった」と自分を責めそうになったのですが、責めても何も解決しないというのは、これまでの経験で学んでいたことでした。\n\n## まずやったこと：薬と説明書を確認した\n\nパニックのまま検索するのではなく、まず手元にあるものを見ようと思いました。処方された薬と、一緒にもらった説明書（添付文書）です。\n\n説明書を見て、今どのくらいの段階なのか、いつ飲み忘れたのかを確認しました。飲み忘れた場合の対応について書かれている箇所もあったのですが、正直、状況によって場合分けがいくつもあって、自分がどのパターンに当てはまるのか、その場では判断しきれませんでした。\n\nここで私が思ったのは、「読んだから安心」ではなく**「読んだからこそ、自己判断は危ないと分かった」**ということでした。説明書は情報源としてとても大事だと思いますが、それを自分なりに解釈して行動するのは、また別の話だと感じたんです。\n\n## 次にやったこと：処方元に連絡した\n\nそのあと私は、処方してもらっている診療先に連絡しました。状況をそのまま伝えて、指示を待ちました。\n\n正直、「こんなことで連絡していいのかな」という迷いはありました。でも、下手に自己判断するより、聞いてしまったほうがいいと思ったので、思い切って連絡しました。\n\n返事をもらうまでの時間は、かなり長く感じました。届いた内容は、私がどのタイミングで飲み忘れたか、直近の状況はどうだったかを踏まえた、私のケースに合わせた案内でした。それを読んで、ようやく肩の力が抜けたのを覚えています。\n\n## 具体的な対処法をここに書かない理由\n\nここまで読んで、「それで結局、飲み忘れたらどうすればいいの」と思った人もいるかもしれません。ですが、**私が受けた案内の中身を、ここにそのまま書くことはしません。**\n\n理由は単純で、飲み忘れへの対応は、薬の種類や、いつ飲み忘れたか、どのくらい時間が経っているかによって変わるようだからです。私が調べた範囲でも、ケースによって書かれている対応が違っていて、一つの正解のように扱えるものではないと感じました。\n\n私の場合にちょうどよかった案内が、別の人にもそのまま当てはまるとは限りません。むしろ、状況の違うケースに私の体験談を当てはめて自己判断してしまうことのほうが、私は怖いと思います。\n\nなので、これだけは伝えたいです。**飲み忘れに気づいたときは、まず処方された薬の説明書を確認するか、処方してもらった医師・薬剤師に相談してください。** 自己判断で「たぶんこれで大丈夫」と決めてしまわないでほしいと思っています。\n\n## 同じ状況になったときのために、今やっていること\n\nあの日以来、私が変えたことをいくつか書きます。\n\n- **説明書をすぐ出せる場所に置く**:慌てたときに探し回らなくていいように、薬と同じ場所に保管しています\n- **処方元の連絡先をスマホのメモに残す**:診察券の情報や相談窓口など、慌てたときにすぐ開けるようにしました\n- **飲み忘れた事実だけをまず確認する**:感情が先走る前に、手元を確認する、という行動から始めるようにしています\n\nそれでも、飲み忘れそうになる日はまだあります。完璧に管理できるようになったわけではなくて、「忘れたときにどう動くか」を先に決めておいただけ、という感じです。\n\nもし今、飲み忘れに気づいて不安な気持ちでこの記事を読んでいるなら、まずは深呼吸をして、説明書を確認するか、処方してもらった医師・薬剤師に連絡してみてほしいです。ひとりで抱え込んで自己判断するより、そのほうがずっと安心できると、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"36","title":"旅行前に、体調の波を初めて相談した話","category":"更年期症状・からだ","isHub":false,"wordCount":1929,"body":"このページを開いている人は、もしかすると旅行のしおりやカレンダーを見ながら、「その日に限って調子が悪かったらどうしよう」と考えているところかもしれません。少し前の私も、まったく同じことをしていました。\n\n数年ぶりに友人たちと計画した旅行の日程が決まったとき、真っ先に頭をよぎったのは行き先のことではなく、「あの日、動けなかったらどうしよう」という不安でした。今日はそのとき、旅行の前に体調の波を婦人科で相談してみた話を書いておきます。効果ややり方を説明する記事ではなく、「相談してみた」という体験の記録として読んでもらえたらうれしいです。\n\n## 体調に波があると気づいていた頃\n\n四十代に入ってしばらくしてから、体調にはっきりとした波を感じるようになりました。急に顔がほてって汗が出る日、朝起きても疲れが抜けていない日、理由もなく気持ちが沈む日。日によって差が大きくて、自分でも予測がつきませんでした。\n\n仕事や家のことは、調子のいい日にまとめて片づけて、悪い日はやり過ごす。そんなふうに、いつのまにか波に合わせて生活を組み立てるのが癖になっていました。**でも旅行だけは、その日の調子に合わせて動くというわけにはいきません。** 集合時間も、宿の予約も、みんなの予定もある。そこが、いつもの日常といちばん違うところでした。\n\n## 相談する前に迷ったこと\n\n正直に書くと、相談する前は結構迷いました。\n\n「旅行のためだけに婦人科に行くなんて、大げさじゃないか」「もっと切実な悩みの人が優先されるべきなんじゃないか」。そんなふうに、自分の相談を勝手に小さく見積もっていた気がします。予約の画面を開いても、指が止まる瞬間が何度もありました。\n\nでも冷静に考えると、体調の波に予定を振り回されるのは、私にとってずっと現実的な悩みでした。せっかくの旅行を不安なまま迎えるくらいなら、一度きちんと相談してみてもいいはずだ。**「これくらいで相談していいのかな」という迷いは、相談しない理由にはならない。** 今はそう思っています。\n\n## 実際に相談してみて\n\n相談したときは、まず旅行の日程と、ここ数か月の体調の記録を伝えました。いつどんな不調が出やすいか、自分なりにスマホのメモに書きためていたので、それを見せながら話しました。\n\n医師からは、私の場合に考えられる過ごし方や、旅行前に準備しておけそうなことについて説明がありました。「絶対にこうなる」という断定的な言い方ではなく、「こういう選び方もありますよ」という距離感だったのが印象に残っています。具体的にどう対応したかは私個人の状況によるところが大きいので、ここで細かく書くのは控えますが、身構えていた分、拍子抜けするくらい普通に受け止めてもらえました。\n\n**相談してみて意外だったのは、「そんなに珍しい相談ではない」という雰囲気だったこと**でした。体調の波と予定の兼ね合いで悩む人は、私だけではなかったのだと知れただけでも、行った意味があったように思います。\n\n## 対面でもオンラインでも相談できると知った\n\n今回私は、通っている婦人科に対面で相談に行きました。ただ調べていく中で、こうした相談をオンライン診療で受け付けているところもあるようだと知りました。\n\n旅行の予定が急に決まったときや、平日に通院の時間が取れないときは、オンラインという選択肢も現実的だなと感じました。対面かオンラインか、どちらが正解ということではなく、そのときの自分の都合や不安の度合いに合わせて選べばいいのだと、今のところ私は考えています。\n\n## 旅行本番はどうだったか\n\n結論から言うと、旅行中は思っていたより穏やかに過ごすことができました。もちろんこれは私の場合の結果であって、同じようにいくとは限りません。\n\nそれでも、「相談すらしていなかったら、今回も不安を抱えたまま出かけていたんだろうな」と思うと、行動してよかったという気持ちが素直に残っています。**うまくいったかどうかより、選択肢を知って相談してみたこと自体が、私にとっては収穫でした。**\n\n## 同じように悩んでいる人へ\n\n体調に波があると、楽しみな予定ほど「その日に限って」と身構えてしまう気持ちは、私にもよくわかります。\n\n理由が旅行でも、仕事でも、家族の行事でも、相談する理由に優劣はないと思います。相談してみて初めて、自分に合う過ごし方があるのかどうかがわかるのだと、今回感じました。\n\n同じようにカレンダーとにらめっこしている人に、この記事が少しでも届いたらうれしいです。ひとりで抱え込まなくていいと、私は思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、医師など専門家に相談してください。"},{"num":"37","title":"ホルモンバランスの変化で肌が変わった気がする、という話","category":"更年期症状・からだ","isHub":false,"wordCount":2086,"body":"四十代に入ってしばらく経ったころ、ふと鏡を見て「あれ、なんだか肌が前と違う気がする」と思った日がありました。乾きやすくなったような、化粧のノリが変わったような。でもすぐに「これ、本当に年齢やホルモンのせいなのかな」という疑問がわいてきました。\n\n気づけば夜、スマホを片手に「更年期 肌 変化」で検索していたこともありました。同じように、肌の変化を感じて似た言葉を検索窓に打ち込んだことがある人は、たぶん私だけではないと思います。この記事は、その疑問について私なりに考えたことの記録です。\n\n先に断っておくと、これは医療情報ではなく、私ひとりの体験と感想です。ホルモンと肌の関係を保証するものではありません。\n\n## 「なんとなく肌が変わった」と気づいた日\n\nきっかけははっきりしません。ある朝、いつものように化粧水をつけていて、「そういえば最近、しっとり感が続かない気がする」と思ったのが最初でした。\n\nはっきりと「これが変化です」と言えるほど劇的なものではなく、**「言われてみればそうかも」くらいの、輪郭がぼんやりした変化**でした。日記をつけているわけでもないので、いつからそう感じ始めたのかも、正確には思い出せません。\n\n同世代の友人と会ったとき、「最近、肌の調子どう?」という話になったこともありました。似たようなことを感じている人がそばにいるとわかると、なんとなく本当だったんだ、と思えた瞬間でした。それでも、それがホルモンの変化のせいなのかどうかは、そのときの私にはまだわかりませんでした。\n\n## 本当にホルモンのせいなのか、調べてみたこと\n\n気になったので、自分なりに調べてみました。私が調べた範囲では、ホルモンバランスと肌の状態には関係があると言われているようです。ただ、それがそのまま「更年期になると必ず肌がこう変わる」という話に直結するわけではなさそうだ、というのが私なりの理解です。\n\nそもそも、その時期の私には他にも変わったことがたくさんありました。睡眠が浅くなっていたし、忙しさで食事が不規則な週も多かった。季節の変わり目でもあったし、長年使っていた化粧品を少し前に変えたばかりでもありました。\n\n**肌の変化の理由を、ホルモンひとつに絞り込むことは、私にはできませんでした。** これは私の場合の話であって、他の人にも同じことが言えるとは限らないと思います。\n\n## 私の場合の変化\n\n具体的にどう変わったかというと、正直、細かいところまでは覚えていません。ただ感覚として残っているのは、以前より肌が乾きやすくなったのと、生理前あたりの肌のゆらぎ方が前と少し違う気がする、ということでした。\n\nもっとも、これも「気がする」レベルの話で、写真を撮って比較したわけでもありません。曖昧なところは曖昧なまま、ここに書いておきたいと思います。年齢を重ねれば肌が変わっていくのは自然なことでもあるので、何もかもをホルモンのせいにするのも違うのかな、と今は感じています。\n\n## 婦人科で聞いてみた話\n\n気になったので、別の相談で婦人科に行ったとき、担当してくれた医師に肌のことも聞いてみたことがあります。\n\n返ってきたのは、「肌の変化を感じる人はいるけれど、個人差が大きく、原因もひとつとは限らない」という説明でした。ホルモンの影響を感じる人もいれば、生活習慣や年齢的な変化のほうが大きい人もいるようだ、とも言われました。\n\n**肌のことは肌のことで、皮膚科など専門のところに相談する道もある**、と教えてもらえたのも、私にはありがたい話でした。婦人科で全部が解決するわけではない、という当たり前のことに、あらためて気づかされた気がします。\n\n## 原因を決めつけないでおこうと思った\n\nこの話を聞いてから、私は肌の変化を「更年期のせい」と決めつけるのをやめました。そう決めつけてしまうと、「もう年だから仕方ない」で終わってしまいそうで、それは違う気がしたんです。\n\n乾きが気になるならスキンケアを見直せばいいし、どうしても気になるなら専門のところに相談すればいい。**原因を決めつけないでおくことで、かえって自分にできることが見えてきた**、というのが私の実感です。あくまで私個人の感じ方ですが。\n\n## 同じように気になっている人へ\n\n「ホルモンの変化で肌が変わった気がする」という感覚は、私にとっては確かにありました。でもそれが医学的にそうだと言い切れるかというと、私にはわかりません。\n\n季節や睡眠、食事
